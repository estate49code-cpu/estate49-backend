<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorites — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <script src="/nav.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#c0392b;--primary-dark:#a93226;--primary-light:#fadbd8;--bg:#f7f7f8;--card:#fff;--border:#e5e5e5;--text:#0d0d0d;--muted:#6e6e80}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
    .auth-loading{position:fixed;inset:0;background:white;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999}
    .al-icon{width:56px;height:56px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px}
    .al-spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .page{display:none}
    .wrap{max-width:1100px;margin:0 auto;padding:32px 20px 60px}
    .page-header{margin-bottom:28px}
    .page-title{font-size:24px;font-weight:800;color:var(--text);margin-bottom:4px}
    .page-sub{font-size:14px;color:var(--muted)}
    .prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .prop-card{background:var(--card);border-radius:18px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.25s;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
    .prop-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1);border-color:var(--primary)}
    .prop-img-wrap{position:relative;height:200px;overflow:hidden;background:#ececf1}
    .prop-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
    .prop-card:hover .prop-img-wrap img{transform:scale(1.04)}
    .prop-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;background:var(--bg)}
    .prop-badge{position:absolute;top:12px;left:12px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase}
    .prop-badge.rent{background:#e3f2fd;color:#1565c0}
    .prop-badge.buy{background:#e8f5e9;color:#2e7d32}
    .remove-btn{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s}
    .remove-btn:hover{background:#fadbd8;transform:scale(1.15)}
    .prop-body{padding:16px}
    .prop-price{font-size:20px;font-weight:800;color:var(--primary);margin-bottom:4px}
    .prop-price span{font-size:13px;font-weight:500;color:var(--muted)}
    .prop-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
    .prop-location{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);margin-bottom:10px}
    .prop-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .prop-tag{padding:4px 10px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--muted);font-weight:500}
    .prop-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
    .prop-contact{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
    .prop-contact:hover{background:var(--primary-dark)}
    .empty-state{text-align:center;padding:80px 24px;display:flex;flex-direction:column;align-items:center;gap:12px}
    .empty-icon{font-size:56px;margin-bottom:8px}
    .empty-title{font-size:20px;font-weight:700}
    .empty-sub{font-size:14px;color:var(--muted);max-width:360px;line-height:1.6}
    .empty-btn{margin-top:8px;padding:11px 24px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:500;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:600px){.wrap{padding:16px 14px 60px}.prop-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="auth-loading" id="auth-loading"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>
  <div class="wrap">
    <div class="page-header">
      <div class="page-title">❤️ My Favorites</div>
      <div class="page-sub" id="fav-sub">Loading your saved properties...</div>
    </div>
    <div class="prop-grid" id="fav-grid">
      <div class="empty-state"><div class="al-spin" style="margin:0 auto"></div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast-el"></div>
<script>
  let currentUser = null;

  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const session = await getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      currentUser = session.user;
      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('page').style.display = 'block';
      await initNavbar({ active: 'favorites' });
      await loadFavorites();
    } catch(e) { window.location.href = '/login.html'; }
  });

  async function loadFavorites() {
    try {
      const res  = await fetch(`/api/favorites/${currentUser.id}`);
      const data = await res.json();
      const grid = document.getElementById('fav-grid');
      document.getElementById('fav-sub').textContent = `${data.length} saved ${data.length === 1 ? 'property' : 'properties'}`;

      if (!data.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">💔</div>
          <div class="empty-title">No favorites yet</div>
          <div class="empty-sub">Browse properties and tap ❤️ to save ones you love.</div>
          <button class="empty-btn" onclick="window.location.href='/browse.html'">Browse Properties</button>
        </div>`;
        return;
      }

      grid.innerHTML = data.map(f => {
        const p = f.properties;
        if (!p) return '';
        const isRent = p.type === 'rent';
        const photo  = p.photos?.[0];
        const price  = isRent
          ? `₹${Number(p.price).toLocaleString('en-IN')}<span>/month</span>`
          : `₹${formatPrice(p.price)}`;
        const tags = [
          p.bhk ? `🛏️ ${p.bhk} BHK` : '',
          p.area ? `📐 ${p.area} sq.ft` : '',
          p.furnished ? `🪑 ${capitalize(p.furnished)}` : ''
        ].filter(Boolean);

        return `<div class="prop-card" onclick="window.location.href='/property.html?id=${p.id}'">
          <div class="prop-img-wrap">
            ${photo ? `<img src="${photo}" alt="${esc(p.title)}" loading="lazy"/>` : `<div class="prop-img-placeholder">🏠</div>`}
            <span class="prop-badge ${isRent?'rent':'buy'}">${isRent?'Rent':'Buy'}</span>
            <button class="remove-btn" title="Remove from favorites" onclick="event.stopPropagation();removeFav(${p.id},this)">❤️</button>
          </div>
          <div class="prop-body">
            <div class="prop-price">${price}</div>
            <div class="prop-title">${esc(p.title)}</div>
            <div class="prop-location">📍 ${esc((p.locality?p.locality+', ':'')+( p.city||''))}</div>
            <div class="prop-tags">${tags.map(t=>`<span class="prop-tag">${t}</span>`).join('')}</div>
            <div class="prop-footer">
              <span style="font-size:11px;color:var(--muted)">Saved</span>
              <button class="prop-contact" onclick="event.stopPropagation();window.location.href='/property.html?id=${p.id}'">View Details →</button>
            </div>
          </div>
        </div>`;
      }).join('');
    } catch(e) {
      toast('❌ Failed to load favorites');
    }
  }

  async function removeFav(propertyId, btn) {
    btn.textContent = '🤍';
    try {
      await fetch('/api/favorites', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: currentUser.id, property_id: propertyId })
      });
      toast('Removed from favorites');
      setTimeout(() => loadFavorites(), 600);
    } catch(e) { toast('Failed to remove'); btn.textContent = '❤️'; }
  }

  function formatPrice(n){ n=Number(n); if(n>=10000000) return (n/10000000).toFixed(1).replace(/\.0$/,'')+'Cr'; if(n>=100000) return (n/100000).toFixed(1).replace(/\.0$/,'')+'L'; return n.toLocaleString('en-IN'); }
  function capitalize(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):''; }
  function esc(t){ return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
  function toast(msg){ const el=document.getElementById('toast-el'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }
</script>
</body>
</html>
