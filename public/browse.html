<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Browse — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script><script src="/nav.js"></script>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .filters{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .sw{position:relative;flex:1;min-width:180px;max-width:300px;}
    .sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
    .sw input{padding-left:36px;}
    .ttabs{display:flex;background:var(--surface-2);border-radius:var(--radius-md);padding:3px;gap:2px;border:1px solid var(--border);}
    .tt{padding:7px 14px;border-radius:6px;font-size:var(--text-sm);font-weight:600;color:var(--muted);transition:all var(--transition);cursor:pointer;}
    .tt.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);}
    .fsel{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-md);background:var(--surface);font-size:var(--text-sm);min-width:100px;}
    .fsel:focus{outline:none;border-color:var(--primary);}
    .ml{margin-left:auto;}
    .rbar{display:flex;align-items:center;justify-content:space-between;padding:10px 32px;font-size:var(--text-sm);color:var(--muted);border-bottom:1px solid var(--divider);}
    .gwrap{padding:24px 32px;}
    .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:20px;}
    /* Card */
    .pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;transition:all var(--transition);cursor:pointer;display:flex;flex-direction:column;}
    .pc:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(192,57,43,0.18);}
    .ci{position:relative;height:196px;background:var(--surface-3);overflow:hidden;}
    .ci img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
    .pc:hover .ci img{transform:scale(1.04);}
    .cph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;}
    .cbdg{position:absolute;top:10px;left:10px;}
    .cht{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.9);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--transition);box-shadow:var(--shadow-sm);border:none;cursor:pointer;z-index:2;}
    .cht:hover{transform:scale(1.15);}
    .cht.sv{background:var(--primary-light);}
    .cb{padding:14px;flex:1;}
    .cprice{font-size:var(--text-xl);font-weight:800;color:var(--primary);margin-bottom:2px;}
    .cprice span{font-size:var(--text-xs);font-weight:500;color:var(--muted);}
    .ctitle{font-size:var(--text-sm);font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cloc{font-size:var(--text-xs);color:var(--muted);margin-bottom:12px;}
    .cstats{display:flex;gap:12px;padding-top:12px;border-top:1px solid var(--divider);}
    .cstat{font-size:var(--text-xs);color:var(--muted);}
    .cacts{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--divider);}
    .cbtn{flex:1;padding:7px;border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:600;border:1.5px solid var(--border);background:var(--surface);transition:all var(--transition);}
    .cbtn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-xlight);}
    .cbtn.p{background:var(--primary);color:#fff;border-color:var(--primary);}
    .cbtn.p:hover{background:var(--primary-dark);}
    .lmw{display:flex;justify-content:center;padding:32px;}
    @media(max-width:768px){.filters{padding:10px 16px;}.gwrap{padding:16px;}.rbar{padding:8px 16px;}.ml{margin-left:0;}}
  </style>
</head>
<body>
<div class="auth-loading" id="al"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>
  <div class="filters">
    <div class="sw">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="form-input" id="q" placeholder="City, area, title…" style="width:100%"/>
    </div>
    <div class="ttabs">
      <button class="tt active" onclick="setT('')">All</button>
      <button class="tt" onclick="setT('rent')">Rent</button>
      <button class="tt" onclick="setT('buy')">Buy</button>
    </div>
    <select class="fsel" id="fb" onchange="go()"><option value="">All BHK</option><option>1</option><option>2</option><option>3</option><option>4</option></select>
    <select class="fsel" id="fc" onchange="go()"><option value="">All Cities</option><option>Bengaluru</option><option>Mumbai</option><option>Delhi</option><option>Hyderabad</option><option>Chennai</option><option>Pune</option></select>
    <select class="fsel ml" id="fs" onchange="go()"><option value="newest">Newest</option><option value="price_asc">Price ↑</option><option value="price_desc">Price ↓</option></select>
  </div>
  <div class="rbar"><span id="cnt">Loading…</span></div>
  <div class="gwrap">
    <div class="pgrid" id="grid">
      ${Array(6).fill('<div class="pc"><div style="height:196px" class="skeleton"></div><div class="cb"><div class="skeleton skeleton-text" style="width:55%"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:35%"></div></div></div>').join('')}
    </div>
    <div class="lmw" id="lmw" style="display:none">
      <button class="btn btn-secondary" onclick="more()">Load More</button>
    </div>
  </div>
</div>
<div class="toast" id="toast-el"></div>

<script>
let all=[],fil=[],shown=0,typ='',cu=null,tok=null,favs=new Set();
const PS=12;

window.addEventListener('DOMContentLoaded', async () => {
  const s=await getSession(); if(!s){window.location.href='/login.html';return;}
  cu=s.user; tok=s.access_token;
  document.getElementById('al').style.display='none';
  document.getElementById('page').style.display='block';
  await initNavbar({active:'browse'});
  await Promise.all([loadAll(), loadFavs()]);
  let t; document.getElementById('q').addEventListener('input',()=>{clearTimeout(t);t=setTimeout(go,280);});
});

async function loadAll(){
  try{ const r=await fetch('/api/properties'); all=await r.json(); if(!Array.isArray(all))all=[]; go(); }
  catch(e){ toast('Failed to load'); }
}
async function loadFavs(){
  try{
    const r=await fetch('/api/favorites',{headers:{Authorization:`Bearer ${tok}`}});
    if(r.ok){ const d=await r.json(); (d||[]).forEach(f=>favs.add(String(f.property_id))); }
  }catch(e){}
}

function setT(t){
  typ=t;
  document.querySelectorAll('.tt').forEach((el,i)=>el.classList.toggle('active',i===['','rent','buy'].indexOf(t)));
  go();
}

function go(){
  const q=document.getElementById('q').value.toLowerCase();
  const bhk=document.getElementById('fb').value;
  const city=document.getElementById('fc').value;
  const sort=document.getElementById('fs').value;
  fil=all.filter(p=>{
    if(typ&&p.type!==typ)return false;
    if(bhk&&String(p.bhk)!==bhk)return false;
    if(city&&!p.city?.toLowerCase().includes(city.toLowerCase()))return false;
    if(q&&![p.title,p.locality,p.city,p.description].filter(Boolean).join(' ').toLowerCase().includes(q))return false;
    return true;
  });
  if(sort==='price_asc')fil.sort((a,b)=>a.price-b.price);
  else if(sort==='price_desc')fil.sort((a,b)=>b.price-a.price);
  else fil.sort((a,b)=>new Date(b.posted_at)-new Date(a.posted_at));
  shown=0; document.getElementById('grid').innerHTML='';
  document.getElementById('cnt').textContent=`${fil.length} propert${fil.length===1?'y':'ies'}`;
  more();
}

function more(){
  const sl=fil.slice(shown,shown+PS); const g=document.getElementById('grid');
  if(shown===0&&!sl.length){
    g.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🏚️</div><div class="empty-title">No properties found</div><div class="empty-sub">Try adjusting your filters</div></div>';
    document.getElementById('lmw').style.display='none'; return;
  }
  sl.forEach(p=>g.insertAdjacentHTML('beforeend',card(p)));
  shown+=sl.length;
  document.getElementById('lmw').style.display=shown<fil.length?'flex':'none';
}

function card(p){
  const rent=p.type==='rent', sv=favs.has(String(p.id)), own=cu&&p.listed_by===cu.id;
  const pr=rent?`₹${Number(p.price).toLocaleString('en-IN')}<span>/mo</span>`:`₹${fp(p.price)}`;
  return`<div class="pc" onclick="gp(event,'${p.id}')">
    <div class="ci">
      ${p.photos?.[0]?`<img src="${p.photos[0]}" alt="${x(p.title)}" loading="lazy" width="400" height="196"/>`:'<div class="cph">🏠</div>'}
      <span class="cbdg badge badge-${rent?'rent':'buy'}">${rent?'Rent':'Buy'}</span>
      <button class="cht ${sv?'sv':''}" data-id="${p.id}" onclick="tf(event,'${p.id}')">${sv?'❤️':'🤍'}</button>
    </div>
    <div class="cb">
      <div class="cprice">${pr}</div>
      <div class="ctitle">${x(p.title||'Property')}</div>
      <div class="cloc">📍 ${x([p.locality,p.city].filter(Boolean).join(', '))}</div>
      <div class="cstats">
        ${p.bhk?`<span class="cstat">🛏 ${p.bhk}BHK</span>`:''}
        ${p.area?`<span class="cstat">📐 ${p.area}ft²</span>`:''}
        ${p.furnished?`<span class="cstat">🛋 ${cp(p.furnished)}</span>`:''}
      </div>
    </div>
    <div class="cacts">
      <button class="cbtn p" onclick="gp(event,'${p.id}')">View</button>
      ${!own&&p.listed_by?`<button class="cbtn" onclick="gm(event,'${p.id}','${p.listed_by}')">💬 Msg</button>`:''}
      <button class="cbtn ${sv?'p':''}" id="sb${p.id}" onclick="tf(event,'${p.id}')">${sv?'❤️':'🤍'}</button>
    </div>
  </div>`;
}

function gp(e,id){if(e.target.closest('.cht,.cacts'))return;window.location.href=`/property.html?id=${id}`;}
function gm(e,id,oid){e.stopPropagation();window.location.href=`/messages.html?to=${oid}&listing=${id}`;}

async function tf(e,id){
  e.stopPropagation();
  if(!cu){window.location.href='/login.html';return;}
  const sv=favs.has(String(id));
  try{
    if(sv){
      await fetch(`/api/favorites/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${tok}`}});
      favs.delete(String(id)); toast('Removed from saved');
    }else{
      await fetch('/api/favorites',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tok}`},body:JSON.stringify({property_id:Number(id)})});
      favs.add(String(id)); toast('❤️ Saved!');
    }
    // Update all heart buttons for this property
    document.querySelectorAll(`[data-id="${id}"].cht`).forEach(b=>{
      b.textContent=favs.has(String(id))?'❤️':'🤍';
      b.classList.toggle('sv',favs.has(String(id)));
    });
    const sb=document.getElementById('sb'+id);
    if(sb){sb.textContent=favs.has(String(id))?'❤️':'🤍';sb.classList.toggle('p',favs.has(String(id)));}
  }catch(ex){toast('Failed');}
}

function fp(n){n=Number(n);if(n>=10000000)return(n/10000000).toFixed(1).replace(/\.0$/,'')+'Cr';if(n>=100000)return(n/100000).toFixed(1).replace(/\.0$/,'')+'L';return n.toLocaleString('en-IN');}
function x(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cp(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function toast(m){const el=document.getElementById('toast-el');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
</script>
</body>
</html>
