<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Notifications — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script><script src="/nav.js"></script>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .nw{max-width:640px;margin:0 auto;padding:36px 24px;}
    .nh{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .nh-title{font-size:var(--text-2xl);font-weight:800;}
    .nitem{display:flex;align-items:flex-start;gap:14px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;transition:all var(--transition);cursor:pointer;}
    .nitem:hover{border-color:var(--primary);background:var(--primary-xlight);}
    .nitem.unread{border-left:3px solid var(--primary);}
    .nicon{font-size:26px;flex-shrink:0;}
    .ntext{font-size:var(--text-sm);line-height:1.5;}
    .ntime{font-size:var(--text-xs);color:var(--faint);margin-top:4px;}
    .udot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:6px;}
    @media(max-width:600px){.nw{padding:16px;}}
  </style>
</head>
<body>
<div class="auth-loading" id="al"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>
  <div class="nw">
    <div class="nh">
      <div class="nh-title">🔔 Notifications</div>
      <button class="btn btn-secondary" onclick="readAll()">Mark all read</button>
    </div>
    <div id="nlist">
      ${Array(4).fill('<div class="nitem"><div class="skeleton" style="width:26px;height:26px;border-radius:50%"></div><div style="flex:1"><div class="skeleton skeleton-text" style="width:80%"></div><div class="skeleton skeleton-text" style="width:35%"></div></div></div>').join('')}
    </div>
  </div>
</div>
<div class="toast" id="toast-el"></div>

<script>
let tok=null;

window.addEventListener('DOMContentLoaded', async () => {
  const s=await getSession(); if(!s){window.location.href='/login.html';return;}
  tok=s.access_token;
  document.getElementById('al').style.display='none';
  document.getElementById('page').style.display='block';
  await initNavbar({active:'notifications'});
  await load();
});

async function load(){
  try{
    const r=await fetch('/api/notifications',{headers:{Authorization:`Bearer ${tok}`}});
    const data=await r.json(); const el=document.getElementById('nlist');
    if(!Array.isArray(data)||!data.length){
      el.innerHTML='<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-title">No notifications</div><div class="empty-sub">When owners respond or someone messages you, it will appear here</div></div>';
      return;
    }
    el.innerHTML=data.map(n=>`
      <div class="nitem ${n.read?'':'unread'}" onclick="markRead(${n.id},this)">
        <div class="nicon">${n.icon||'🔔'}</div>
        <div style="flex:1"><div class="ntext">${x(n.message)}</div><div class="ntime">${timeAgo(n.created_at)}</div></div>
        ${!n.read?'<div class="udot"></div>':''}
      </div>`).join('');
  }catch(e){document.getElementById('nlist').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load</div></div>';}
}

async function markRead(id,el){
  el.classList.remove('unread'); el.querySelector('.udot')?.remove();
  await fetch(`/api/notifications/${id}/read`,{method:'POST',headers:{Authorization:`Bearer ${tok}`}});
}

async function readAll(){
  await fetch('/api/notifications/read-all',{method:'POST',headers:{Authorization:`Bearer ${tok}`}});
  document.querySelectorAll('.nitem').forEach(el=>{el.classList.remove('unread');el.querySelector('.udot')?.remove();});
  toast('All marked as read');
}

function timeAgo(d){
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
}
function x(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m){const el=document.getElementById('toast-el');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
</script>
</body>
</html>
