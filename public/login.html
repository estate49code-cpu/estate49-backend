<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f6f2;padding:16px;}
    .card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:24px;}
    .logo-icon{font-size:32px;}
    .logo-text{font-size:24px;font-weight:800;color:#c0392b;}
    .tabs{display:flex;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:24px;overflow:hidden;}
    .tab{flex:1;padding:10px;font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;color:#888;transition:all 0.2s;}
    .tab.active{background:#c0392b;color:#fff;}
    .google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border:1.5px solid #dadce0;border-radius:8px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-bottom:16px;}
    .google-btn:hover{background:#f5f5f5;border-color:#c0392b;}
    .google-btn img{width:18px;height:18px;}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e5e5;}
    .divider span{font-size:12px;color:#aaa;}
    .form-group{margin-bottom:14px;}
    label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#333;}
    input{width:100%;padding:10px 12px;border:1.5px solid #e5e5e5;border-radius:8px;font-size:14px;font-family:inherit;transition:border-color 0.2s;}
    input:focus{outline:none;border-color:#c0392b;}
    .forgot{float:right;font-size:12px;color:#c0392b;text-decoration:none;margin-top:-4px;}
    .forgot:hover{text-decoration:underline;}
    .submit-btn{width:100%;padding:12px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:background 0.2s;}
    .submit-btn:hover{background:#a93226;}
    .submit-btn:disabled{background:#e0a0a0;cursor:not-allowed;}
    .err{background:#fee2e2;color:#c0392b;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
    .success{background:#d1fae5;color:#065f46;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
    .name-group{display:none;}
    .name-group.show{display:block;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🏠</span>
    <span class="logo-text">Estate49</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div class="err" id="err-box"></div>
  <div class="success" id="success-box"></div>

  <!-- Google -->
  <button class="google-btn" onclick="handleGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
    Continue with Google
  </button>

  <div class="divider"><span>or</span></div>

  <!-- Form -->
  <form onsubmit="handleSubmit(event)">
    <div class="form-group name-group" id="name-group">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="Your full name" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">
        Password
        <a href="#" class="forgot" id="forgot-link" onclick="forgotPassword(event)">Forgot password?</a>
      </label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="6"/>
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
  </form>
</div>

<script>
let currentTab = 'signin';

window.addEventListener('DOMContentLoaded', async () => {
  // Handle error params from OAuth redirect (e.g. ?error=server_error)
  const params = new URLSearchParams(window.location.search);
  const oauthError = params.get('error_description') || params.get('error');
  if (oauthError) {
    showError(decodeURIComponent(oauthError.replace(/\+/g,' ')));
    // Clean the URL so error doesn't persist on refresh
    window.history.replaceState({}, '', '/login.html');
  }

  // If already signed in, redirect away
  const s = await getSession();
  if (s) { window.location.href = '/index.html'; return; }

  // Check for mode=signup in URL
  if (params.get('mode') === 'signup') switchTab('signup');
});

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('name-group').classList.toggle('show', tab === 'signup');
  document.getElementById('submit-btn').textContent = tab === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('forgot-link').style.display = tab === 'signin' ? 'inline' : 'none';
  document.getElementById('password').placeholder = tab === 'signin' ? '••••••••' : 'Min. 6 characters';
  document.getElementById('password').autocomplete = tab === 'signin' ? 'current-password' : 'new-password';
  clearMessages();
}

// ── Google ────────────────────────────────────────────────────────────────────
async function handleGoogle() {
  clearMessages();
  try {
    await signInWithGoogle();
  } catch(e) {
    showError(e.message || 'Google sign-in failed');
  }
}

// ── Form submit (handles both sign in & sign up) ──────────────────────────────
async function handleSubmit(e) {
  e.preventDefault();
  clearMessages();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const name     = document.getElementById('fullname').value.trim();
  const btn      = document.getElementById('submit-btn');

  if (currentTab === 'signup') {
    if (!name)             { showError('Please enter your full name'); return; }
    if (!email)            { showError('Please enter your email'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters'); return; }

    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      const data = await signUpEmail(email, password);
      if (data?.user && !data?.session) {
        // Email confirmation required
        showSuccess('✅ Check your email for a confirmation link, then sign in.');
        switchTab('signin');
      } else if (data?.session) {
        // Auto-confirmed — save name then redirect
        try {
          await fetch('/api/profiles/me', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${data.session.access_token}` },
            body: JSON.stringify({ fullname: name })
          });
        } catch(_) {}
        window.location.href = '/index.html';
      }
    } catch(err) {
      showError(err.message || 'Sign up failed. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account';
    }

  } else {
    // Sign In
    if (!email || !password) { showError('Enter your email and password'); return; }

    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      await signInEmail(email, password);
      window.location.href = '/index.html';
    } catch(err) {
      showError(err.message || 'Incorrect email or password.');
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }
}

// ── Forgot password ───────────────────────────────────────────────────────────
async function forgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Enter your email above first, then click Forgot password.'); return; }
  try {
    const { error } = await _sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });
    if (error) throw error;
    showSuccess('✅ Password reset email sent! Check your inbox.');
  } catch(err) {
    showError(err.message || 'Could not send reset email.');
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('err-box');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('success-box').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('success-box');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('err-box').style.display = 'none';
}
function clearMessages() {
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('success-box').style.display = 'none';
}
</script>
</body>
</html>
