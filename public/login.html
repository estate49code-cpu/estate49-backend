<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:16px;}
    .auth-card{width:100%;max-width:420px;}
    .auth-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px;}
    .auth-logo-icon{width:52px;height:52px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;}
    .auth-logo-text{font-size:1.875rem;font-weight:800;color:var(--primary);}
    .tabs{display:flex;background:var(--surface-2);border-radius:var(--radius-lg);padding:4px;margin-bottom:20px;border:1px solid var(--border);}
    .tab{flex:1;padding:10px;border-radius:calc(var(--radius-lg) - 3px);font-size:var(--text-sm);font-weight:600;color:var(--muted);transition:all var(--transition);}
    .tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);}
    .aform{display:flex;flex-direction:column;gap:16px;}
    .aform.hidden{display:none;}
    .gbtn{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-md);background:var(--surface);font-size:var(--text-sm);font-weight:600;width:100%;transition:all var(--transition);}
    .gbtn:hover{border-color:var(--primary);background:var(--primary-xlight);}
    .or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:var(--text-xs);}
    .or::before,.or::after{content:'';flex:1;height:1px;background:var(--divider);}
    .amsg{padding:12px 16px;border-radius:var(--radius-md);font-size:var(--text-sm);display:none;}
    .amsg.ok{background:var(--success-light);color:var(--success);display:block;}
    .amsg.er{background:var(--primary-light);color:var(--primary);display:block;}
    .fgt{font-size:var(--text-xs);color:var(--primary);cursor:pointer;}
    .fgt:hover{text-decoration:underline;}
  </style>
</head>
<body>
<script src="/auth.js"></script>
<div class="auth-card card">
  <div class="auth-logo">
    <div class="auth-logo-icon">🏠</div>
    <span class="auth-logo-text">Estate49</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('in')">Sign In</button>
    <button class="tab"        onclick="sw('up')">Sign Up</button>
  </div>

  <div class="amsg" id="msg"></div>

  <!-- SIGN IN -->
  <form class="aform" id="fi" onsubmit="doIn(event)">
    <button type="button" class="gbtn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <div class="or">or</div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="si-e" placeholder="you@example.com" required/>
    </div>
    <div class="form-group">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <label class="form-label">Password</label>
        <span class="fgt" onclick="doFgt()">Forgot password?</span>
      </div>
      <input type="password" class="form-input" id="si-p" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn btn-primary btn-full btn-lg" id="bsi">Sign In</button>
  </form>

  <!-- SIGN UP -->
  <form class="aform hidden" id="fu" onsubmit="doUp(event)">
    <button type="button" class="gbtn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <div class="or">or</div>
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-input" id="su-n" placeholder="Your full name" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="su-e" placeholder="you@example.com" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="su-p" placeholder="Min 6 characters" required minlength="6"/>
    </div>
    <button type="submit" class="btn btn-primary btn-full btn-lg" id="bsu">Create Account</button>
  </form>
</div>

<script>
  getSession().then(s => { if (s) window.location.href = '/browse.html'; });

  function sw(t) {
    document.getElementById('fi').classList.toggle('hidden', t !== 'in');
    document.getElementById('fu').classList.toggle('hidden', t !== 'up');
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='in')||(i===1&&t==='up')));
    clrMsg();
  }
  function showMsg(txt, cls) { const el=document.getElementById('msg'); el.textContent=txt; el.className='amsg '+cls; }
  function clrMsg() { document.getElementById('msg').className='amsg'; }

  async function doIn(e) {
    e.preventDefault();
    const btn=document.getElementById('bsi'); btn.disabled=true; btn.textContent='Signing in…';
    const r=await signInWithEmail(document.getElementById('si-e').value, document.getElementById('si-p').value);
    if (r.success) window.location.href='/browse.html';
    else { showMsg(r.message,'er'); btn.disabled=false; btn.textContent='Sign In'; }
  }
  async function doUp(e) {
    e.preventDefault();
    const btn=document.getElementById('bsu'); btn.disabled=true; btn.textContent='Creating…';
    const r=await signUpWithEmail(document.getElementById('su-e').value, document.getElementById('su-p').value, document.getElementById('su-n').value);
    if (r.success) showMsg(r.message,'ok');
    else { showMsg(r.message,'er'); btn.disabled=false; btn.textContent='Create Account'; }
  }
  async function doFgt() {
    const email=document.getElementById('si-e').value;
    if (!email) { showMsg('Enter your email first','er'); return; }
    const r=await resetPassword(email);
    showMsg(r.message, r.success?'ok':'er');
  }
</script>
</body>
</html>
