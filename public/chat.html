<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI Assistant — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="/auth.js"></script><script src="/nav.js"></script>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .chat-wrap{max-width:760px;margin:0 auto;display:flex;flex-direction:column;height:calc(100dvh - var(--nav-h));padding:0;}

    /* Header */
    .chat-top{padding:13px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .ai-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#e74c3c);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .ai-name{font-size:15px;font-weight:700;line-height:1.2;}
    .ai-sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px;}
    .online-dot{width:7px;height:7px;border-radius:50%;background:#27ae60;flex-shrink:0;}

    /* Quick chips */
    .sugg-bar{display:flex;flex-wrap:wrap;gap:7px;padding:10px 18px 8px;background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border);}
    .sugg{padding:6px 13px;border:1.5px solid var(--border);border-radius:99px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;background:var(--surface);transition:all .18s;white-space:nowrap;}
    .sugg:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-xlight);}

    /* Messages */
    .chat-body{flex:1;overflow-y:auto;padding:18px 18px 10px;display:flex;flex-direction:column;gap:16px;background:var(--bg);}
    .msg-row{display:flex;gap:9px;align-items:flex-start;}
    .msg-row.user{flex-direction:row-reverse;}
    .msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px;}
    .msg-av.bot{background:linear-gradient(135deg,var(--primary),#e74c3c);font-size:15px;color:#fff;}
    .msg-av.usr{background:var(--primary);color:#fff;font-size:11px;}
    .msg-col{display:flex;flex-direction:column;gap:8px;max-width:80%;}
    .msg-row.user .msg-col{align-items:flex-end;}

    /* Bubbles */
    .bubble{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.75;word-break:break-word;}
    .bubble.bot{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text);}
    .bubble.user{background:var(--primary);color:#fff;border-top-right-radius:4px;}
    .bubble strong{font-weight:700;}
    .bubble em{font-style:italic;}
    .bubble code{background:rgba(0,0,0,0.07);padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace;}
    .bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
    .b-gap{height:6px;}
    .b-list{display:flex;flex-direction:column;gap:5px;margin:6px 0;}
    .b-item{display:flex;gap:8px;align-items:flex-start;line-height:1.6;}
    .b-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:6px;}
    .bubble.user .b-dot{background:rgba(255,255,255,0.8);}

    /* Property card */
    .prop-card{background:var(--surface-2,#f8f9fa);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;margin:8px 0;}
    .pc-title{font-weight:800;font-size:14px;margin-bottom:7px;}
    .pc-meta{display:flex;flex-wrap:wrap;gap:5px 12px;font-size:12px;color:var(--muted);margin-bottom:8px;}
    .pc-why{background:rgba(39,174,96,0.09);border-left:3px solid #27ae60;padding:7px 10px;border-radius:0 6px 6px 0;font-size:12px;margin-bottom:10px;line-height:1.55;}
    .pc-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--primary);color:#fff;border-radius:99px;font-size:12px;font-weight:700;text-decoration:none;transition:.15s;}
    .pc-btn:hover{background:var(--primary-dark);}

    /* Listing preview card */
    .listing-card{background:linear-gradient(135deg,#f0fff4,#e8f5e9);border:2px solid #27ae60;border-radius:14px;padding:15px 17px;margin:8px 0;}
    .lc-title{font-weight:800;font-size:14px;color:#155724;margin-bottom:11px;}
    .lc-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.06);font-size:13px;gap:12px;}
    .lc-row:last-of-type{border-bottom:none;}
    .lc-label{color:var(--muted);font-weight:600;white-space:nowrap;flex-shrink:0;}
    .lc-val{font-weight:700;text-align:right;}

    /* Photo upload zone */
    .photo-upload-zone{border:2px dashed #27ae60;border-radius:12px;padding:15px;margin:10px 0;background:rgba(39,174,96,0.04);text-align:center;}
    .photo-upload-zone p{font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.55;}
    .photos-preview{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;justify-content:center;}
    .photo-thumb-wrap{position:relative;}
    .photo-thumb{width:70px;height:70px;border-radius:8px;object-fit:cover;border:2px solid var(--border);display:block;}
    .photo-cover-label{position:absolute;bottom:2px;left:2px;background:var(--primary);color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;}
    .photo-rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#e74c3c;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;}
    .upload-prog{font-size:12px;color:var(--muted);margin-top:8px;}

    /* Action buttons */
    .msg-actions{display:flex;flex-wrap:wrap;gap:8px;}
    .act-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;border:2px solid;text-decoration:none;background:transparent;}
    .act-btn.green{background:#27ae60;color:#fff;border-color:#27ae60;}
    .act-btn.green:hover:not(:disabled){background:#219a52;}
    .act-btn.green:disabled{background:#aaa;border-color:#aaa;cursor:not-allowed;opacity:.7;}
    .act-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
    .act-btn.primary:hover{background:var(--primary-dark);}
    .act-btn.outline{color:var(--primary);border-color:var(--primary);}
    .act-btn.outline:hover{background:var(--primary-xlight);}

    /* Typing */
    .typing-dot{display:flex;gap:5px;padding:4px 2px;}
    .dot{width:8px;height:8px;background:var(--muted);border-radius:50%;animation:db 1.2s ease infinite;}
    .dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
    @keyframes db{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

    /* Input */
    .chat-input-wrap{padding:10px 14px 12px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:9px;flex-shrink:0;}
    .chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-lg);font-size:14px;resize:none;max-height:110px;transition:border-color .18s;font-family:inherit;line-height:1.55;background:var(--bg);}
    .chat-input:focus{outline:none;border-color:var(--primary);}
    .send-btn{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;border:none;cursor:pointer;transition:.15s;flex-shrink:0;}
    .send-btn:hover:not(:disabled){background:var(--primary-dark);transform:scale(1.05);}
    .send-btn:disabled{background:var(--muted);cursor:not-allowed;}

    @media(max-width:600px){
      .chat-body{padding:12px 11px 8px;}
      .bubble{font-size:13px;}
      .msg-col{max-width:88%;}
      .sugg-bar{padding:8px 11px 6px;}
    }
  </style>
</head>
<body>
<div class="auth-loading" id="al"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>
  <div class="chat-wrap">

    <div class="chat-top">
      <div class="ai-avatar">🤖</div>
      <div>
        <div class="ai-name">Estate49 AI</div>
        <div class="ai-sub"><div class="online-dot"></div>Online · Real Estate Expert</div>
      </div>
      <button class="btn btn-secondary" style="margin-left:auto;font-size:12px;padding:6px 13px;" onclick="clearChat()">🔄 New Chat</button>
    </div>

    <div class="sugg-bar" id="sugg-bar">
      <span class="sugg" onclick="qs('I want to find a 2BHK flat to rent in Bengaluru under ₹25,000')">🔍 Find 2BHK</span>
      <span class="sugg" onclick="qs('I want to list my property for rent')">🏗️ List Property</span>
      <span class="sugg" onclick="qs('Best areas in Bengaluru for families')">🏘️ Family Areas</span>
      <span class="sugg" onclick="qs('What is a fair rent for a 3BHK in Whitefield?')">💰 Price Advice</span>
      <span class="sugg" onclick="qs('Tell me about Estate49')">ℹ️ About Us</span>
    </div>

    <div class="chat-body" id="chat-body"></div>

    <div class="chat-input-wrap">
      <textarea class="chat-input" id="inp" rows="1" placeholder="Ask about properties, areas, prices…"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()">➤</button>
    </div>

  </div>
</div>

<input type="file" id="photo-file-inp" accept="image/*" multiple style="display:none" onchange="handlePhotoFiles(event)"/>
<div class="toast" id="toast-el"></div>

<script>
let socket = null, userInitials = '?', waiting = false;
let accessToken = null, pendingListing = null, pendingPhotos = [];

window.addEventListener('DOMContentLoaded', async () => {
  const s = await getSession();
  if (!s) { window.location.href = '/login.html'; return; }
  accessToken = s.access_token;
  try {
    const r = await fetch('/api/profiles/me', { headers: { Authorization: `Bearer ${s.access_token}` }});
    if (r.ok) {
      const p = await r.json();
      const n = p.fullname || s.user.email || 'U';
      userInitials = n.split(' ').map(x => x[0]).join('').toUpperCase().slice(0, 2);
    }
  } catch(e) {}
  document.getElementById('al').style.display = 'none';
  document.getElementById('page').style.display = 'block';
  await initNavbar({ active: 'chat' });
  connect();
});

// ── Socket ──────────────────────────────────────────────────
function connect() {
  socket = io();
  socket.on('botReply', d => {
    removeTyping();
    waiting = false;
    setSendBtn(false);
    renderBotMsg(d.message || d, d.listingData || null);
  });
  socket.on('typing', v => { if (v) showTyping(); else removeTyping(); });
  socket.on('connect_error', () => {
    removeTyping(); waiting = false; setSendBtn(false);
    addSimpleBotMsg('⚠️ Connection lost. Please refresh the page.');
  });
}

function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt || waiting) return;
  addUserMsg(txt);
  inp.value = ''; inp.style.height = 'auto';
  waiting = true; setSendBtn(true);
  document.getElementById('sugg-bar').style.display = 'none';
  socket.emit('userMessage', { message: txt });
}

function qs(txt) { document.getElementById('inp').value = txt; send(); }

function clearChat() {
  if (socket) socket.disconnect();
  document.getElementById('chat-body').innerHTML = '';
  document.getElementById('sugg-bar').style.display = 'flex';
  waiting = false; pendingListing = null; pendingPhotos = [];
  setSendBtn(false); connect();
}

// ── User message ────────────────────────────────────────────
function addUserMsg(text) {
  const body = document.getElementById('chat-body');
  body.insertAdjacentHTML('beforeend', `
    <div class="msg-row user">
      <div class="msg-av usr">${userInitials}</div>
      <div class="msg-col"><div class="bubble user">${esc(text)}</div></div>
    </div>`);
  body.scrollTop = body.scrollHeight;
}

// ── Bot message ─────────────────────────────────────────────
function renderBotMsg(rawText, listingDataFromServer) {
  const body = document.getElementById('chat-body');

  // Strip [LISTING_READY] block from display text
  let display = rawText.replace(/\[LISTING_READY\][\s\S]*?\[\/LISTING_READY\]/g, '').trim();

  // Parse listing JSON
  let listing = listingDataFromServer || null;
  if (!listing) {
    const m = rawText.match(/\[LISTING_READY\]([\s\S]*?)\[\/LISTING_READY\]/);
    if (m) { try { listing = JSON.parse(m[1].trim()); } catch(e) { console.error('Listing parse error:', e); } }
  }
  if (listing) { pendingListing = listing; pendingPhotos = []; }

  const bubbleHtml = formatMessage(display);

  let extraHtml = '';
  if (listing) {
    extraHtml += buildListingCard(listing);
    extraHtml += buildPhotoZone();
  }

  // Action buttons
  let actions = '';
  if (listing) {
    actions = `
      <div class="msg-actions">
        <button class="act-btn green" id="publish-btn" onclick="confirmListing()">✅ Confirm &amp; Publish</button>
        <button class="act-btn outline" onclick="qs('I want to change some details')">✏️ Edit Details</button>
      </div>`;
  } else if (/list.*property|add.*property|want to list/i.test(display)) {
    actions = `
      <div class="msg-actions">
        <button class="act-btn primary" onclick="qs('I want to list my property through AI chat')">🤖 List via AI</button>
        <a class="act-btn outline" href="/list-property.html">📝 Listing Form</a>
      </div>`;
  }

  body.insertAdjacentHTML('beforeend', `
    <div class="msg-row">
      <div class="msg-av bot">🤖</div>
      <div class="msg-col">
        <div class="bubble bot">${bubbleHtml}${extraHtml}</div>
        ${actions}
      </div>
    </div>`);
  body.scrollTop = body.scrollHeight;
}

function addSimpleBotMsg(text) { renderBotMsg(text, null); }

// ── Format markdown → HTML ──────────────────────────────────
function formatMessage(text) {
  const lines = esc(text).split('\n');
  let html = '', inList = false;

  for (let line of lines) {
    line = line
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');

    const isDivider = /^[━─=]{3,}/.test(line.trim());
    const isBullet  = /^[•\-]\s/.test(line.trim());
    const isEmpty   = line.trim() === '';

    if (isDivider) {
      if (inList) { html += '</div>'; inList = false; }
      html += '<hr/>'; continue;
    }
    if (isBullet) {
      if (!inList) { html += '<div class="b-list">'; inList = true; }
      html += `<div class="b-item"><div class="b-dot"></div><div>${line.replace(/^[•\-]\s+/, '')}</div></div>`;
      continue;
    }
    if (inList) { html += '</div>'; inList = false; }
    isEmpty ? (html += '<div class="b-gap"></div>') : (html += `<div>${line}</div>`);
  }
  if (inList) html += '</div>';

  // Property card detection
  html = html.replace(
    /<div>🏠 <strong>(.+?)<\/strong><\/div>([\s\S]*?)<div>🔗 \[View Property →\]\(\/property\.html\?id=(\d+)\)<\/div>/g,
    (_, title, mid, id) => {
      const clean = mid.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
      return `<div class="prop-card">
        <div class="pc-title">🏠 ${title}</div>
        <div class="pc-meta">${clean}</div>
        <a class="pc-btn" href="/property.html?id=${id}" target="_blank">View Property →</a>
      </div>`;
    }
  );
  return html;
}

// ── Listing preview card ────────────────────────────────────
function buildListingCard(l) {
  const fmt = v => v ? `₹${Number(v).toLocaleString('en-IN')}` : '—';
  return `<div class="listing-card">
    <div class="lc-title">📋 Listing Preview — Ready to Publish</div>
    <div class="lc-row"><span class="lc-label">Title</span><span class="lc-val">${esc(l.title||'')}</span></div>
    <div class="lc-row"><span class="lc-label">Type</span><span class="lc-val">${esc(l.type||'')} · ${esc(l.property_type||'')}</span></div>
    <div class="lc-row"><span class="lc-label">Location</span><span class="lc-val">${esc(l.locality||'')}${l.city?', '+esc(l.city):''}</span></div>
    <div class="lc-row"><span class="lc-label">Price</span><span class="lc-val">${fmt(l.price)}</span></div>
    ${l.deposit ? `<div class="lc-row"><span class="lc-label">Deposit</span><span class="lc-val">${fmt(l.deposit)}</span></div>` : ''}
    <div class="lc-row"><span class="lc-label">Size</span><span class="lc-val">${l.bhk||0} BHK · ${l.bathrooms||0} Bath · ${l.area||0} sqft</span></div>
    <div class="lc-row"><span class="lc-label">Furnishing</span><span class="lc-val">${esc(l.furnished||'—')}</span></div>
    <div class="lc-row"><span class="lc-label">Contact</span><span class="lc-val">${esc(l.contact_name||'')} · ${esc(l.contact_phone||'')}</span></div>
    <div class="lc-row"><span class="lc-label">Amenities</span><span class="lc-val">${esc((l.amenities||[]).join(', ')||'—')}</span></div>
  </div>`;
}

// ── Photo upload zone ───────────────────────────────────────
function buildPhotoZone() {
  return `<div class="photo-upload-zone" id="photo-zone">
    <p>📸 <strong>Upload property photos</strong><br/>
    Good photos get 3× more inquiries.<br/>
    <span style="font-size:11px;color:var(--muted)">Max 10 · Auto-compressed &amp; E49 watermarked · JPG/PNG/WEBP</span></p>
    <button class="act-btn primary" type="button"
      onclick="document.getElementById('photo-file-inp').click()" style="margin:0 auto;">
      📷 Choose Photos
    </button>
    <div class="photos-preview" id="photos-preview"></div>
    <div class="upload-prog" id="upload-prog"></div>
  </div>`;
}

// ── Handle photo upload ─────────────────────────────────────
async function handlePhotoFiles(e) {
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  const avail = 10 - pendingPhotos.length;
  if (avail <= 0) { showToast('Max 10 photos allowed'); return; }
  const toUp = files.slice(0, avail);
  const prog = document.getElementById('upload-prog');
  if (prog) prog.textContent = `Uploading ${toUp.length} photo(s)…`;

  for (const f of toUp) {
    try {
      const fd = new FormData();
      fd.append('file', f);

      const r = await fetch('/api/upload', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}` },
        body: fd
        // ← NO Content-Type header: browser sets multipart/form-data with boundary
      });

      if (!r.ok) {
        const errText = await r.text();
        console.error('Upload failed:', errText);
        showToast(`Failed: ${f.name}`);
        continue;
      }

      const result = await r.json();
      // upload.js returns { url: '...' }
      const url = typeof result === 'string' ? result : (result.url || result.publicUrl || null);
      if (!url) throw new Error('No URL in response');

      pendingPhotos.push(url);
      renderPhotoThumbs();
    } catch(ex) {
      console.error('Upload exception:', ex);
      showToast('Upload failed: ' + f.name);
    }
  }

  const prog2 = document.getElementById('upload-prog');
  if (prog2) prog2.textContent = pendingPhotos.length
    ? `✅ ${pendingPhotos.length} photo(s) ready`
    : '⚠️ Upload failed — check console';
}

function renderPhotoThumbs() {
  const preview = document.getElementById('photos-preview');
  if (!preview) return;
  preview.innerHTML = pendingPhotos.map((url, i) => `
    <div class="photo-thumb-wrap">
      <img class="photo-thumb" src="${url}" alt="photo ${i+1}" loading="lazy"/>
      ${i === 0 ? '<div class="photo-cover-label">COVER</div>' : ''}
      <div class="photo-rm" onclick="removeThumb(${i})">✕</div>
    </div>`).join('');
}

function removeThumb(i) { pendingPhotos.splice(i, 1); renderPhotoThumbs(); }

// ── Confirm & Publish ───────────────────────────────────────
async function confirmListing() {
  if (!pendingListing || !accessToken) return;
  const btn = document.getElementById('publish-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Publishing…'; }

  try {
    const ALL_AMENITIES = ['parking','lift','wifi','ac','balcony','security','gym','pool',
      'gated','vastu','water_24','no_brokerage','powerbackup','cctv','clubhouse',
      'garden','modular_kitchen','washing_machine','fridge','pet_friendly'];
    const amenityObj = {};
    const confirmedAmenities = (pendingListing.amenities || []).map(a => a.toLowerCase().replace(/\s+/g,'_'));
    ALL_AMENITIES.forEach(k => { amenityObj[k] = confirmedAmenities.includes(k); });

    const payload = {
      type:          pendingListing.type          || 'rent',
      property_type: pendingListing.property_type || 'apartment',
      bhk:           Number(pendingListing.bhk)   || null,
      bathrooms:     Number(pendingListing.bathrooms) || null,
      title:         pendingListing.title,
      city:          pendingListing.city,
      locality:      pendingListing.locality,
      description:   pendingListing.description,
      price:         Number(pendingListing.price),
      deposit:       pendingListing.deposit  ? Number(pendingListing.deposit)  : null,
      area:          pendingListing.area     ? Number(pendingListing.area)     : null,
      furnished:     pendingListing.furnished || null,
      contact_name:  pendingListing.contact_name,
      contact_phone: pendingListing.contact_phone,
      contact_role:  pendingListing.contact_role  || 'owner',
      contact_time:  pendingListing.contact_time  || null,
      photos:        pendingPhotos,
      ...amenityObj
    };

    const r = await fetch('/api/properties', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${accessToken}` },
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error((await r.json()).error || 'Publish failed');
    const data = await r.json();

    pendingListing = null; pendingPhotos = [];
    addSimpleBotMsg(
      `🎉 **Your property has been submitted for review!**\n\n` +
      `Our team will approve it shortly — once approved, it goes live on Estate49 for everyone to see.\n\n` +
      (data.id ? `🔗 [View your listing →](/property.html?id=${data.id})\n\n` : '') +
      `You can manage all your listings from **Profile → My Listings**.`
    );
  } catch(e) {
    console.error('Publish error:', e);
    showToast('Could not publish: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '✅ Confirm & Publish'; }
  }
}

// ── Helpers ─────────────────────────────────────────────────
function showTyping() {
  removeTyping();
  document.getElementById('chat-body').insertAdjacentHTML('beforeend', `
    <div class="msg-row" id="typing-ind">
      <div class="msg-av bot">🤖</div>
      <div class="msg-col"><div class="bubble bot">
        <div class="typing-dot"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div></div>
    </div>`);
  document.getElementById('chat-body').scrollTop = 99999;
}
function removeTyping()  { document.getElementById('typing-ind')?.remove(); }
function setSendBtn(d)   { const b = document.getElementById('send-btn'); b.disabled = d; b.style.opacity = d ? '.5' : '1'; }
function autoResize(el)  { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }
function esc(t)          { return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(m)    {
  const el = document.getElementById('toast-el');
  if (!el) return;
  el.textContent = m; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}
</script>
