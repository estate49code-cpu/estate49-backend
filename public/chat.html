<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI Assistant — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="/auth.js"></script><script src="/nav.js"></script>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .chat-wrap{max-width:720px;margin:0 auto;display:flex;flex-direction:column;height:calc(100dvh - var(--nav-h));padding:0;}
    .chat-top{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .ai-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#e74c3c);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .ai-name{font-size:var(--text-base);font-weight:700;}
    .ai-sub{font-size:var(--text-xs);color:var(--muted);}
    .chat-body{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;background:var(--bg);}
    .msg-row{display:flex;gap:10px;align-items:flex-end;}
    .msg-row.user{flex-direction:row-reverse;}
    .msg-av{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .msg-av.bot{background:linear-gradient(135deg,var(--primary),#e74c3c);}
    .bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:var(--text-sm);line-height:1.6;word-break:break-word;}
    .bubble.bot{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .bubble.user{background:var(--primary);color:#fff;border-bottom-right-radius:4px;}
    .typing-dot{display:flex;gap:4px;padding:12px 16px;}
    .dot{width:8px;height:8px;background:var(--muted);border-radius:50%;animation:dotbounce 1.2s ease infinite;}
    .dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
    @keyframes dotbounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
    .chat-input-wrap{padding:12px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:10px;}
    .chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-lg);font-size:var(--text-sm);resize:none;max-height:120px;transition:border-color var(--transition);}
    .chat-input:focus{outline:none;border-color:var(--primary);}
    .send-btn{width:42px;height:42px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--transition);flex-shrink:0;border:none;cursor:pointer;}
    .send-btn:hover{background:var(--primary-dark);transform:scale(1.05);}
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:10px 24px;background:var(--bg);}
    .sugg{padding:7px 14px;border:1.5px solid var(--border);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;color:var(--muted);cursor:pointer;background:var(--surface);transition:all var(--transition);}
    .sugg:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-xlight);}
    @media(max-width:768px){
      .chat-wrap{height:calc(100dvh - 54px - 62px);}
      .chat-body{padding:12px 14px;}
      .chat-input-wrap{padding:8px 12px 10px;}
      .chat-top{padding:12px 14px;}
      .suggestions{padding:8px 12px;gap:6px;}
      .sugg{font-size:11px;padding:6px 12px;}
      .bubble{max-width:85%;}
    }
  </style>
</head>
<body>
<div class="auth-loading" id="al"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>
  <div class="chat-wrap">
    <div class="chat-top">
      <div class="ai-avatar">🤖</div>
      <div>
        <div class="ai-name">Estate49 AI Assistant</div>
        <div class="ai-sub">Powered by Groq · Bengaluru Real Estate Expert</div>
      </div>
      <button class="btn btn-secondary" style="margin-left:auto;font-size:var(--text-xs)" onclick="clearChat()">🔄 New Chat</button>
    </div>
    <div class="suggestions" id="sugg-bar">
      <span class="sugg" onclick="qs('Find 2BHK flat under ₹20,000/month in Koramangala')">2BHK Koramangala &lt;₹20k</span>
      <span class="sugg" onclick="qs('I want to list my apartment for rent')">List my apartment</span>
      <span class="sugg" onclick="qs('Best localities in Bengaluru for families')">Family-friendly areas</span>
      <span class="sugg" onclick="qs('What is a reasonable deposit for a 3BHK?')">Deposit norms</span>
    </div>
    <div class="chat-body" id="chat-body"></div>
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="inp" rows="1" placeholder="Ask anything about Bengaluru real estate…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
      <button class="send-btn" onclick="send()">➤</button>
    </div>
  </div>
</div>
<script>
let socket=null, userInitials='?', waiting=false;
window.addEventListener('DOMContentLoaded', async () => {
  const s=await getSession(); if(!s){window.location.href='/login.html';return;}
  try{const r=await fetch('/api/profiles/me',{headers:{Authorization:`Bearer ${s.access_token}`}});if(r.ok){const p=await r.json();const n=p.fullname||s.user.email||'U';userInitials=n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);}}catch(e){}
  document.getElementById('al').style.display='none';
  document.getElementById('page').style.display='block';
  await initNavbar({active:'chat'});
  connect();
});
function connect(){
  socket=io();
  socket.on('botReply', d=>{ removeTyping(); addMsg(formatMd(d.message||d),'bot'); });
  socket.on('typing', v=>{ if(v)showTyping(); else removeTyping(); });
  socket.on('connect_error', ()=>addMsg('Connection failed. Please refresh.','bot'));
}
function send(){
  const inp=document.getElementById('inp'); const txt=inp.value.trim(); if(!txt||waiting)return;
  addMsg(esc(txt),'user'); inp.value=''; inp.style.height='auto'; waiting=true;
  document.getElementById('sugg-bar').style.display='none';
  socket.emit('userMessage',{message:txt});
}
function qs(txt){document.getElementById('inp').value=txt;send();}
function clearChat(){if(socket){socket.disconnect();}document.getElementById('chat-body').innerHTML='';document.getElementById('sugg-bar').style.display='flex';waiting=false;connect();}
function addMsg(html,who){
  const body=document.getElementById('chat-body'); const isBot=who==='bot';
  body.insertAdjacentHTML('beforeend',`<div class="msg-row ${isBot?'':'user'}"><div class="msg-av ${isBot?'bot':''}">${isBot?'🤖':userInitials}</div><div class="bubble ${isBot?'bot':'user'}">${html}</div></div>`);
  body.scrollTop=body.scrollHeight; waiting=false;
}
function showTyping(){
  removeTyping();
  document.getElementById('chat-body').insertAdjacentHTML('beforeend',`<div class="msg-row" id="typing-ind"><div class="msg-av bot">🤖</div><div class="bubble bot"><div class="typing-dot"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`);
  document.getElementById('chat-body').scrollTop=99999;
}
function removeTyping(){document.getElementById('typing-ind')?.remove();}
function formatMd(t){
  return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code style="background:var(--surface-3);padding:1px 5px;border-radius:3px;font-size:0.9em">$1</code>').replace(/\n/g,'<br/>');
}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
