<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Property — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script><script src="/nav.js"></script>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .pw{max-width:1080px;margin:0 auto;padding:32px 24px;}
    .back-btn{display:inline-flex;align-items:center;gap:8px;font-size:var(--text-sm);color:var(--muted);margin-bottom:20px;cursor:pointer;border:none;background:none;font-family:inherit;}
    .back-btn:hover{color:var(--primary);}
    .pgal{border-radius:var(--radius-xl);overflow:hidden;background:var(--surface-3);margin-bottom:28px;position:relative;}
    .pgal-main{width:100%;height:420px;object-fit:cover;display:block;}
    .pgal-ph{width:100%;height:420px;display:flex;align-items:center;justify-content:center;font-size:80px;background:var(--surface-3);}
    .pgal-thumbs{display:flex;gap:8px;padding:10px;background:rgba(0,0,0,0.04);overflow-x:auto;}
    .pgal-thumb{width:72px;height:54px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color var(--transition);flex-shrink:0;}
    .pgal-thumb.active,.pgal-thumb:hover{border-color:var(--primary);}
    .layout{display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start;}
    .prop-title{font-size:var(--text-2xl);font-weight:800;margin-bottom:6px;}
    .prop-loc{font-size:var(--text-base);color:var(--muted);margin-bottom:16px;}
    .prop-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
    .prop-price{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:900;color:var(--primary);}
    .prop-price-sub{font-size:var(--text-sm);color:var(--muted);}
    .prop-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;}
    .pstat{background:var(--surface-2);border:1px solid var(--border);padding:10px 16px;border-radius:var(--radius-lg);font-size:var(--text-sm);display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px;}
    .pstat-icon{font-size:20px;}
    .pstat-val{font-weight:700;font-size:var(--text-base);}
    .pstat-lbl{font-size:var(--text-xs);color:var(--muted);}
    .section-title{font-size:var(--text-lg);font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--divider);}
    .desc-text{font-size:var(--text-sm);color:var(--muted);line-height:1.8;white-space:pre-wrap;}
    .amen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
    .amen-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--primary-xlight);border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:600;color:var(--primary);border:1px solid var(--primary-light);}
    .sidebar{position:sticky;top:calc(var(--nav-h)+20px);}
    .ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:24px;box-shadow:var(--shadow-md);}
    .price-big{font-size:clamp(1.5rem,2.5vw,2rem);font-weight:900;color:var(--primary);margin-bottom:4px;}
    .price-note{font-size:var(--text-xs);color:var(--muted);margin-bottom:20px;}
    .contact-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
    .contact-avatar{width:46px;height:46px;border-radius:50%;background:var(--primary);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
    .contact-name{font-size:var(--text-sm);font-weight:700;}
    .contact-role{font-size:var(--text-xs);color:var(--muted);}
    .ccard-btns{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
    /* WhatsApp button */
    .btn-whatsapp{display:flex;align-items:center;justify-content:center;gap:9px;padding:11px 20px;background:#25d366;color:#fff;border:none;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:700;cursor:pointer;text-decoration:none;transition:background .18s;width:100%;}
    .btn-whatsapp:hover{background:#1ebe5d;}
    /* Google Maps button */
    .btn-maps{display:flex;align-items:center;justify-content:center;gap:9px;padding:11px 20px;background:#4285f4;color:#fff;border:none;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:700;cursor:pointer;text-decoration:none;transition:background .18s;width:100%;}
    .btn-maps:hover{background:#3367d6;}
    .fav-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;background:var(--surface);transition:all var(--transition);cursor:pointer;width:100%;}
    .fav-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-xlight);}
    .fav-btn.saved{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
    .info-rows{margin-top:16px;padding-top:16px;border-top:1px solid var(--divider);}
    .info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:var(--text-xs);border-bottom:1px solid var(--divider);}
    .info-row:last-child{border-bottom:none;}
    .info-key{color:var(--muted);}
    .info-val{font-weight:600;}
    .psec{margin-bottom:32px;}
    .phone-gate{color:var(--primary);font-style:italic;cursor:pointer;}
    .phone-gate:hover{text-decoration:underline;}
    /* Mobile sticky bottom CTA */
    .mobile-cta{
      display:none;
      position:fixed;bottom:62px;left:0;right:0;
      background:rgba(255,255,255,0.97);
      backdrop-filter:blur(8px);
      border-top:1px solid var(--border);
      padding:10px 16px;
      padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
      z-index:150;
      gap:10px;
      align-items:center;
    }
    .mobile-cta-price{font-size:var(--text-lg);font-weight:900;color:var(--primary);flex:1;}
    .mobile-cta-sub{font-size:10px;color:var(--muted);}
    @media(max-width:900px){
      .layout{grid-template-columns:1fr;}
      .sidebar{display:none;}
      .pgal-main{height:260px;}
      .pgal-ph{height:260px;}
    }
    @media(max-width:768px){
      .pw{padding:14px 14px 160px;}
      .prop-title{font-size:var(--text-xl);}
      .prop-stats{gap:8px;}
      .pstat{min-width:68px;padding:8px 10px;}
      .pstat-icon{font-size:18px;}
      .amen-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
      .mobile-cta{display:flex;}
    }
    @media(max-width:480px){
      .pgal-main{height:220px;}
      .pgal-ph{height:220px;}
      .pgal-thumbs{gap:6px;padding:8px;}
      .pgal-thumb{width:58px;height:44px;}
    }
  </style>
</head>
<body>
<div class="auth-loading" id="al"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>
  <div class="pw">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <div id="content">
      <div class="skeleton" style="height:420px;border-radius:var(--radius-xl);margin-bottom:28px;"></div>
      <div class="layout">
        <div>
          <div class="skeleton skeleton-text" style="width:60%;height:2em;margin-bottom:10px;"></div>
          <div class="skeleton skeleton-text" style="width:40%;"></div>
        </div>
        <div class="skeleton" style="height:360px;border-radius:var(--radius-xl);"></div>
      </div>
    </div>
  </div>
  <div class="mobile-cta" id="mobile-cta" style="display:none"></div>
</div>
<div class="toast" id="toast-el"></div>

<script>
let cu=null, tok=null, prop=null, isFav=false;
const pid=new URLSearchParams(window.location.search).get('id');

window.addEventListener('DOMContentLoaded', async () => {
  if(!pid){window.location.href='/browse.html';return;}
  const s=await getSession();
  if(s){ cu=s.user; tok=s.access_token; }
  document.getElementById('al').style.display='none';
  document.getElementById('page').style.display='block';
  await initNavbar({});
  await Promise.all([loadProp(), checkFav()]);
});

async function loadProp(){
  try{
    const r=await fetch(`/api/properties/${pid}`);
    if(!r.ok) throw new Error();
    prop=await r.json();
    document.title=`${prop.title||'Property'} — Estate49`;
    render();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty-state"><div class="empty-icon">🏚️</div><div class="empty-title">Property not found</div><a href="/browse.html" class="btn btn-primary">Browse Properties</a></div>';
  }
}

async function checkFav(){
  if(!tok) return;
  try{
    const r=await fetch('/api/favorites',{headers:{Authorization:`Bearer ${tok}`}});
    if(r.ok){const d=await r.json(); isFav=(d||[]).some(f=>String(f.property_id)===String(pid));}
  }catch(e){}
}

function render(){
  const p=prop;
  const rent=p.type==='rent';
  const pr=rent?`₹${Number(p.price).toLocaleString('en-IN')}`:`₹${fp(p.price)}`;
  const isOwn=cu&&p.listed_by===cu.id;

  const amenities=[
    p.parking&&['🚗','Parking'], p.gym&&['🏋️','Gym'], p.pool&&['🏊','Pool'],
    p.lift&&['🛗','Lift'], p.security&&['💂','Security'], p.cctv&&['📹','CCTV'],
    p.clubhouse&&['🏢','Clubhouse'], p.garden&&['🌳','Garden'],
    p.powerbackup&&['⚡','Power Backup'], p.ac&&['❄️','AC'],
    p.balcony&&['🌅','Balcony'], p.modular_kitchen&&['👨‍🍳','Mod Kitchen'],
    p.washing_machine&&['🫧','Washing M/C'], p.fridge&&['🧊','Fridge'],
    p.wifi&&['📶','WiFi'], p.pet_friendly&&['🐾','Pet Friendly'],
    p.gated&&['🔐','Gated'], p.no_brokerage&&['✅','Zero Brokerage'],
  ].filter(Boolean);

  const photos=p.photos||[];
  const galHtml=photos.length
    ?`<img class="pgal-main" id="main-img" src="${photos[0]}" alt="${x(p.title)}" width="1080" height="420"/>
      ${photos.length>1
        ?`<div class="pgal-thumbs">${photos.map((ph,i)=>`<img class="pgal-thumb ${i===0?'active':''}" src="${ph}" alt="photo ${i+1}" width="72" height="54" loading="lazy" onclick="swImg(this,'${ph}')"/>`).join('')}</div>`
        :''}`
    :`<div class="pgal-ph">🏠</div>`;

  const ownerIni=(p.contact_name||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);

  // Phone — show only if logged in
  const phoneHtml=p.contact_phone
    ? cu
      ? `<div class="info-row"><span class="info-key">Phone</span><span class="info-val"><a href="tel:${x(p.contact_phone)}" style="color:inherit">${x(p.contact_phone)}</a></span></div>`
      : `<div class="info-row"><span class="info-key">Phone</span><span class="info-val"><span class="phone-gate" onclick="showLoginPrompt('Sign in to view contact number')">🔐 Sign in to view</span></span></div>`
    : '';

  // WhatsApp button
  const waMsg=encodeURIComponent(`Hi, I saw your property listing on Estate49 — "${p.title}" in ${p.locality||''}, ${p.city||''}. Is it still available?`);
  const waBtnHtml=p.whatsapp
    ? `<a class="btn-whatsapp" href="https://wa.me/91${x(p.whatsapp)}?text=${waMsg}" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.108.549 4.089 1.512 5.814L.057 23.428a.75.75 0 0 0 .921.921l5.63-1.457A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.726 9.726 0 0 1-4.952-1.355l-.355-.212-3.68.952.976-3.563-.232-.368A9.712 9.712 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>
        </svg>
        Chat on WhatsApp
      </a>`
    : '';

  // Google Maps button
  const mapBtnHtml=p.map_link
    ? `<a class="btn-maps" href="${x(p.map_link)}" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        View on Google Maps
      </a>`
    : '';

  const sidebarHtml=`
    <div class="ccard">
      <div class="price-big">${pr}</div>
      <div class="price-note">${rent?'per month':'total price'}${p.maintenance?` • ₹${Number(p.maintenance).toLocaleString('en-IN')}/mo maintenance`:''}</div>
      <div class="contact-row">
        <div class="contact-avatar">${ownerIni}</div>
        <div>
          <div class="contact-name">${x(p.contact_name||'Owner')}</div>
          <div class="contact-role">${x(cp(p.contact_role||'owner'))}</div>
        </div>
      </div>
      <div class="ccard-btns">
        ${!isOwn?`<button class="btn btn-primary btn-full btn-lg" onclick="msgOwner()">💬 Send Message</button>`:''}
        ${waBtnHtml}
        ${mapBtnHtml}
        <button class="fav-btn ${isFav?'saved':''}" id="fav-btn" onclick="toggleFav()">
          ${isFav?'❤️ Saved':'🤍 Save Property'}
        </button>
        ${isOwn?`<a href="/list-property.html?edit=${p.id}" class="btn btn-secondary btn-full">✏️ Edit Listing</a>`:''}
      </div>
      <div class="info-rows">
        ${phoneHtml}
        ${p.contact_email?`<div class="info-row"><span class="info-key">Email</span><span class="info-val">${x(p.contact_email)}</span></div>`:''}
        ${p.contact_time?`<div class="info-row"><span class="info-key">Best time</span><span class="info-val">${x(p.contact_time)}</span></div>`:''}
        ${p.whatsapp?`<div class="info-row"><span class="info-key">WhatsApp</span><span class="info-val">+91 ${x(p.whatsapp)}</span></div>`:''}
        ${p.property_type?`<div class="info-row"><span class="info-key">Type</span><span class="info-val">${x(cp(p.property_type))}</span></div>`:''}
        ${p.carpet_area?`<div class="info-row"><span class="info-key">Carpet area</span><span class="info-val">${p.carpet_area} ft²</span></div>`:''}
        ${p.vastu?`<div class="info-row"><span class="info-key">Vastu</span><span class="info-val">✅ Compliant</span></div>`:''}
        ${p.water_24?`<div class="info-row"><span class="info-key">Water</span><span class="info-val">24/7</span></div>`:''}
        ${p.available_from?`<div class="info-row"><span class="info-key">Available</span><span class="info-val">${new Date(p.available_from).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span></div>`:''}
      </div>
    </div>`;

  document.getElementById('content').innerHTML=`
    <div class="pgal">${galHtml}</div>
    <div class="layout">
      <div>
        <div class="psec">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
            <span class="badge badge-${rent?'rent':'buy'}">${rent?'For Rent':'For Sale'}</span>
            ${p.no_brokerage?'<span class="badge" style="background:#d4edda;color:#155724">✅ Zero Brokerage</span>':''}
          </div>
          <h1 class="prop-title">${x(p.title||'Property')}</h1>
          <div class="prop-loc">📍 ${x([p.locality,p.city,p.address].filter(Boolean).join(', '))}</div>
          <div class="prop-price-row">
            <span class="prop-price">${pr}</span>
            <span class="prop-price-sub">${rent?'per month':''}</span>
            ${rent&&p.deposit?`<span class="prop-price-sub">• Deposit: ₹${Number(p.deposit).toLocaleString('en-IN')}</span>`:''}
          </div>
          <div class="prop-stats">
            ${p.bhk?`<div class="pstat"><div class="pstat-icon">🛏</div><div class="pstat-val">${p.bhk}</div><div class="pstat-lbl">BHK</div></div>`:''}
            ${p.bathrooms?`<div class="pstat"><div class="pstat-icon">🚿</div><div class="pstat-val">${p.bathrooms}</div><div class="pstat-lbl">Baths</div></div>`:''}
            ${p.area?`<div class="pstat"><div class="pstat-icon">📐</div><div class="pstat-val">${p.area}</div><div class="pstat-lbl">ft²</div></div>`:''}
            ${p.floor?`<div class="pstat"><div class="pstat-icon">🏢</div><div class="pstat-val">${x(p.floor)}</div><div class="pstat-lbl">Floor</div></div>`:''}
            ${p.furnished?`<div class="pstat"><div class="pstat-icon">🛋</div><div class="pstat-val">${x(cp(p.furnished))}</div><div class="pstat-lbl">Furnished</div></div>`:''}
          </div>
        </div>
        ${p.description?`<div class="psec"><h2 class="section-title">About this property</h2><p class="desc-text">${x(p.description)}</p></div>`:''}
        ${amenities.length?`<div class="psec"><h2 class="section-title">Amenities</h2><div class="amen-grid">${amenities.map(([icon,name])=>`<div class="amen-item">${icon} ${name}</div>`).join('')}</div></div>`:''}
        <div class="psec" id="mobile-contact-card" style="display:none">
          <h2 class="section-title">Contact &amp; Details</h2>
          ${sidebarHtml}
        </div>
      </div>
      <div class="sidebar">${sidebarHtml}</div>
    </div>`;

  if(window.innerWidth<=900) document.getElementById('mobile-contact-card').style.display='block';
  window.addEventListener('resize',()=>{
    const mcc=document.getElementById('mobile-contact-card');
    if(mcc) mcc.style.display=window.innerWidth<=900?'block':'none';
  });

  renderMobileCTA(pr, rent, isOwn, p);
}

function renderMobileCTA(pr, rent, isOwn, p){
  const cta=document.getElementById('mobile-cta');
  const waMsg=encodeURIComponent(`Hi, I saw your property listing on Estate49 — "${p.title}" in ${p.locality||''}, ${p.city||''}. Is it still available?`);
  cta.innerHTML=`
    <div style="flex:1;min-width:0">
      <div class="mobile-cta-price">${pr}</div>
      <div class="mobile-cta-sub">${rent?'per month':'total price'}</div>
    </div>
    <button class="fav-btn ${isFav?'saved':''}" id="fav-btn-mob" style="width:auto;padding:9px 12px;font-size:18px;border-radius:var(--radius-md)" onclick="toggleFav()">
      ${isFav?'❤️':'🤍'}
    </button>
    ${p.whatsapp
      ? `<a href="https://wa.me/91${x(p.whatsapp)}?text=${waMsg}" target="_blank" rel="noopener"
           style="display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 13px;background:#25d366;color:#fff;border-radius:var(--radius-md);font-weight:700;font-size:13px;text-decoration:none;flex-shrink:0;">
           <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.108.549 4.089 1.512 5.814L.057 23.428a.75.75 0 0 0 .921.921l5.63-1.457A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.726 9.726 0 0 1-4.952-1.355l-.355-.212-3.68.952.976-3.563-.232-.368A9.712 9.712 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
           WhatsApp
         </a>`
      : ''}
    ${!isOwn
      ? `<button class="btn btn-primary" style="flex-shrink:0" onclick="msgOwner()">💬 Message</button>`
      : `<a href="/list-property.html?edit=${p.id}" class="btn btn-secondary" style="flex-shrink:0">✏️ Edit</a>`}
    ${p.contact_phone
      ? cu
        ? `<a href="tel:${x(p.contact_phone)}" class="btn btn-primary" style="flex-shrink:0">📞 Call</a>`
        : `<button class="btn btn-primary" style="flex-shrink:0" onclick="showLoginPrompt('Sign in to call the owner')">📞 Call</button>`
      : ''}`;
  cta.style.display='';
}

function swImg(el,src){
  document.getElementById('main-img').src=src;
  document.querySelectorAll('.pgal-thumb').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function msgOwner(){
  if(!cu){ showLoginPrompt('Sign in to contact the owner'); return; }
  if(!prop?.listed_by){toast('Owner info unavailable');return;}
  window.location.href=`/messages.html?to=${prop.listed_by}&listing=${pid}`;
}

async function toggleFav(){
  if(!cu){ showLoginPrompt('Sign in to save this property'); return; }
  try{
    if(isFav){
      await fetch(`/api/favorites/${pid}`,{method:'DELETE',headers:{Authorization:`Bearer ${tok}`}});
      isFav=false; toast('Removed from saved');
    }else{
      await fetch('/api/favorites',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tok}`},body:JSON.stringify({property_id:Number(pid)})});
      isFav=true; toast('❤️ Saved!');
    }
    ['fav-btn','fav-btn-mob'].forEach(id=>{
      const b=document.getElementById(id); if(!b)return;
      b.className=`fav-btn ${isFav?'saved':''}`;
      if(id==='fav-btn') b.innerHTML=isFav?'❤️ Saved':'🤍 Save Property';
      else b.innerHTML=isFav?'❤️':'🤍';
    });
  }catch(e){toast('Failed');}
}

function showLoginPrompt(msg){
  document.getElementById('login-prompt')?.remove();
  document.body.insertAdjacentHTML('beforeend',`
    <div id="login-prompt" style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px">
      <div style="background:var(--surface);border-radius:var(--radius-xl);padding:32px 28px;max-width:360px;width:100%;text-align:center;box-shadow:var(--shadow-lg)">
        <div style="font-size:44px;margin-bottom:12px">🔐</div>
        <div style="font-size:var(--text-lg);font-weight:800;margin-bottom:8px">Sign In Required</div>
        <div style="font-size:var(--text-sm);color:var(--muted);margin-bottom:24px">${msg}</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <a href="/login.html" class="btn btn-primary btn-full" style="text-align:center">Sign In</a>
          <a href="/login.html?mode=signup" class="btn btn-secondary btn-full" style="text-align:center">Create Free Account</a>
          <button onclick="document.getElementById('login-prompt').remove()" style="font-size:var(--text-sm);color:var(--muted);background:none;border:none;cursor:pointer;margin-top:2px">Maybe later</button>
        </div>
      </div>
    </div>`);
}

function fp(n){n=Number(n);if(n>=10000000)return(n/10000000).toFixed(1).replace(/\.0$/,'')+'Cr';if(n>=100000)return(n/100000).toFixed(1).replace(/\.0$/,'')+'L';return n.toLocaleString('en-IN');}
function x(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cp(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function toast(m){const el=document.getElementById('toast-el');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
</script>
</body>
</html>
