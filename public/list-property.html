<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>List Property — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script><script src="/nav.js"></script>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .lw{max-width:780px;margin:0 auto;padding:36px 24px;}
    .lh{font-size:var(--text-2xl);font-weight:800;margin-bottom:8px;}
    .lsub{font-size:var(--text-sm);color:var(--muted);margin-bottom:36px;}
    .step{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;margin-bottom:20px;}
    .step-title{font-size:var(--text-lg);font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
    .step-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px;}
    .photo-slot{aspect-ratio:4/3;border-radius:var(--radius-md);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:28px;background:var(--surface-2);transition:all var(--transition);overflow:hidden;position:relative;}
    .photo-slot:hover{border-color:var(--primary);background:var(--primary-xlight);}
    .photo-slot img{width:100%;height:100%;object-fit:cover;}
    .photo-rm{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
    .type-btns{display:flex;gap:10px;flex-wrap:wrap;}
    .type-btn{padding:10px 24px;border:2px solid var(--border);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;transition:all var(--transition);background:var(--surface);cursor:pointer;}
    .type-btn.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
    .form-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    .form-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .save-bar{
      position:sticky;bottom:0;
      background:rgba(255,255,255,0.96);
      backdrop-filter:blur(8px);
      border-top:1px solid var(--border);
      padding:16px 24px;
      display:flex;gap:12px;align-items:center;justify-content:flex-end;
      z-index:100;
    }
    .prog{font-size:var(--text-xs);color:var(--muted);flex:1;}
    /* ✅ Phone field highlight */
    #contact_phone.required-highlight{border-color:var(--primary);box-shadow:0 0 0 3px rgba(192,57,43,0.15);}
    @media(max-width:768px){
      .lw{padding:14px 14px 0;}
      .lh{font-size:var(--text-xl);}
      .lsub{margin-bottom:20px;}
      .step{padding:18px 14px;}
      .form-3,.form-2{grid-template-columns:1fr;}
      .photos-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
      .save-bar{
        padding:12px 14px;
        bottom:calc(62px + env(safe-area-inset-bottom,0px));
      }
      .save-bar .btn{font-size:var(--text-xs);padding:9px 14px;}
      .type-btn{padding:9px 18px;font-size:var(--text-xs);}
    }
    @media(max-width:380px){.photos-grid{grid-template-columns:repeat(3,1fr);}}
    @media(hover:none){.type-btn:active{transform:scale(0.97);}.photo-slot:active{opacity:0.8;}}
  </style>
</head>
<body>
<div class="auth-loading" id="al"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>
  <div class="lw">
    <div class="lh" id="page-title">List Your Property</div>
    <div class="lsub">Fill in the details below. All starred (*) fields are required.</div>

    <!-- STEP 1 -->
    <div class="step">
      <div class="step-title"><div class="step-num">1</div>Property Type &amp; Listing</div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">Listing For *</label>
        <div class="type-btns">
          <button type="button" class="type-btn sel" data-t="rent" onclick="setType('rent')">🔑 Rent</button>
          <button type="button" class="type-btn" data-t="buy" onclick="setType('buy')">🏡 Sale</button>
        </div>
      </div>
      <div class="form-3">
        <div class="form-group">
          <label class="form-label">Property Type *</label>
          <select class="form-select" id="prop_type">
            <option value="apartment">Apartment</option>
            <option value="house">Independent House</option>
            <option value="villa">Villa</option>
            <option value="plot">Plot</option>
            <option value="pg">PG/Hostel</option>
            <option value="commercial">Commercial</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">BHK</label>
          <select class="form-select" id="bhk">
            <option value="">Select</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Bathrooms</label>
          <select class="form-select" id="bathrooms">
            <option value="">Select</option>
            <option>1</option><option>2</option><option>3</option><option>4</option>
          </select>
        </div>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="step">
      <div class="step-title"><div class="step-num">2</div>Title &amp; Location</div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">Listing Title *</label>
        <input type="text" class="form-input" id="title" placeholder="e.g. Spacious 2BHK in Koramangala with parking"/>
      </div>
      <div class="form-2" style="margin-bottom:16px">
        <div class="form-group">
          <label class="form-label">City *</label>
          <input type="text" class="form-input" id="city" placeholder="e.g. Bengaluru" value="Bengaluru"/>
        </div>
        <div class="form-group">
          <label class="form-label">Locality / Area *</label>
          <input type="text" class="form-input" id="locality" placeholder="e.g. Koramangala, HSR Layout"/>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">Full Address</label>
        <input type="text" class="form-input" id="address" placeholder="Flat no, Street, Landmark…"/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="description" placeholder="Describe the property — neighborhood, nearby landmarks, special features…"></textarea>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="step">
      <div class="step-title"><div class="step-num">3</div>Price &amp; Details</div>
      <div class="form-3" style="margin-bottom:16px">
        <div class="form-group">
          <label class="form-label">Price (₹) *</label>
          <input type="number" class="form-input" id="price" placeholder="e.g. 25000"/>
        </div>
        <div class="form-group">
          <label class="form-label">Deposit (₹)</label>
          <input type="number" class="form-input" id="deposit" placeholder="e.g. 100000"/>
        </div>
        <div class="form-group">
          <label class="form-label">Maintenance (₹/mo)</label>
          <input type="number" class="form-input" id="maintenance" placeholder="e.g. 2000"/>
        </div>
      </div>
      <div class="form-3">
        <div class="form-group">
          <label class="form-label">Total Area (ft²)</label>
          <input type="number" class="form-input" id="area" placeholder="1200"/>
        </div>
        <div class="form-group">
          <label class="form-label">Carpet Area (ft²)</label>
          <input type="number" class="form-input" id="carpet_area" placeholder="980"/>
        </div>
        <div class="form-group">
          <label class="form-label">Floor</label>
          <input type="text" class="form-input" id="floor" placeholder="e.g. 3rd of 6"/>
        </div>
      </div>
    </div>

    <!-- STEP 4 -->
    <div class="step">
      <div class="step-title"><div class="step-num">4</div>Furnishing &amp; Availability</div>
      <div class="form-2" style="margin-bottom:16px">
        <div class="form-group">
          <label class="form-label">Furnishing</label>
          <select class="form-select" id="furnished">
            <option value="">Select</option>
            <option value="unfurnished">Unfurnished</option>
            <option value="semi">Semi-Furnished</option>
            <option value="fully">Fully Furnished</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Available From</label>
          <input type="date" class="form-input" id="available_from"/>
        </div>
      </div>
      <label class="form-label" style="margin-bottom:10px;display:block">Amenities</label>
      <div class="check-grid" id="amenities-grid">
        <label class="check-item" id="ci-parking"><input type="checkbox" id="parking" onchange="tgl('parking')"/> 🚗 Parking</label>
        <label class="check-item" id="ci-gym"><input type="checkbox" id="gym" onchange="tgl('gym')"/> 🏋️ Gym</label>
        <label class="check-item" id="ci-pool"><input type="checkbox" id="pool" onchange="tgl('pool')"/> 🏊 Pool</label>
        <label class="check-item" id="ci-lift"><input type="checkbox" id="lift" onchange="tgl('lift')"/> 🛗 Lift</label>
        <label class="check-item" id="ci-security"><input type="checkbox" id="security" onchange="tgl('security')"/> 💂 Security</label>
        <label class="check-item" id="ci-cctv"><input type="checkbox" id="cctv" onchange="tgl('cctv')"/> 📹 CCTV</label>
        <label class="check-item" id="ci-clubhouse"><input type="checkbox" id="clubhouse" onchange="tgl('clubhouse')"/> 🏢 Clubhouse</label>
        <label class="check-item" id="ci-garden"><input type="checkbox" id="garden" onchange="tgl('garden')"/> 🌳 Garden</label>
        <label class="check-item" id="ci-powerbackup"><input type="checkbox" id="powerbackup" onchange="tgl('powerbackup')"/> ⚡ Power Backup</label>
        <label class="check-item" id="ci-ac"><input type="checkbox" id="ac" onchange="tgl('ac')"/> ❄️ AC</label>
        <label class="check-item" id="ci-balcony"><input type="checkbox" id="balcony" onchange="tgl('balcony')"/> 🌅 Balcony</label>
        <label class="check-item" id="ci-modular_kitchen"><input type="checkbox" id="modular_kitchen" onchange="tgl('modular_kitchen')"/> 👨‍🍳 Mod Kitchen</label>
        <label class="check-item" id="ci-washing_machine"><input type="checkbox" id="washing_machine" onchange="tgl('washing_machine')"/> 🫧 Washing M/C</label>
        <label class="check-item" id="ci-fridge"><input type="checkbox" id="fridge" onchange="tgl('fridge')"/> 🧊 Fridge</label>
        <label class="check-item" id="ci-wifi"><input type="checkbox" id="wifi" onchange="tgl('wifi')"/> 📶 WiFi</label>
        <label class="check-item" id="ci-pet_friendly"><input type="checkbox" id="pet_friendly" onchange="tgl('pet_friendly')"/> 🐾 Pet Friendly</label>
        <label class="check-item" id="ci-gated"><input type="checkbox" id="gated" onchange="tgl('gated')"/> 🔐 Gated</label>
        <label class="check-item" id="ci-vastu"><input type="checkbox" id="vastu" onchange="tgl('vastu')"/> 🕉 Vastu</label>
        <label class="check-item" id="ci-water_24"><input type="checkbox" id="water_24" onchange="tgl('water_24')"/> 💧 24/7 Water</label>
        <label class="check-item" id="ci-no_brokerage"><input type="checkbox" id="no_brokerage" onchange="tgl('no_brokerage')"/> ✅ Zero Brokerage</label>
      </div>
    </div>

    <!-- STEP 5 -->
    <div class="step">
      <div class="step-title"><div class="step-num">5</div>Contact Details</div>
      <div class="form-2" style="margin-bottom:16px">
        <div class="form-group">
          <label class="form-label">Contact Name *</label>
          <input type="text" class="form-input" id="contact_name" placeholder="Your name"/>
        </div>
        <div class="form-group">
          <!-- ✅ Mobile number — required, highlighted -->
          <label class="form-label">Mobile Number * <span style="font-size:11px;color:var(--primary);font-weight:600">(required to list)</span></label>
          <input type="tel" class="form-input" id="contact_phone" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric"/>
        </div>
      </div>
      <div class="form-2" style="margin-bottom:16px">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="contact_email"/>
        </div>
        <div class="form-group">
          <label class="form-label">I am a</label>
          <select class="form-select" id="contact_role">
            <option value="owner">Owner</option>
            <option value="agent">Agent / Broker</option>
            <option value="builder">Builder</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Best time to contact</label>
        <input type="text" class="form-input" id="contact_time" placeholder="e.g. Weekdays 10am–7pm"/>
      </div>
    </div>

    <!-- STEP 6 -->
    <div class="step">
      <div class="step-title"><div class="step-num">6</div>Photos</div>
      <p class="form-hint" style="margin-bottom:12px">Add up to 10 photos. First photo will be the cover. JPG/PNG/WEBP, max 10MB each.</p>
      <div class="photos-grid" id="photos-grid">
        <div class="photo-slot" onclick="pickPhoto()" title="Add photo">➕</div>
      </div>
      <input type="file" id="file-inp" accept="image/*" multiple style="display:none" onchange="handleFiles(event)"/>
      <div id="upload-status" style="margin-top:8px;font-size:var(--text-xs);color:var(--muted)"></div>
    </div>

    <div style="height:8px"></div>
  </div>

  <div class="save-bar">
    <span class="prog" id="prog-txt"></span>
    <button class="btn btn-secondary" onclick="window.location.href='/browse.html'">Cancel</button>
    <button class="btn btn-primary btn-lg" id="sub-btn" onclick="submit()">🏠 Publish Listing</button>
  </div>
</div>
<div class="toast" id="toast-el"></div>

<script>
let tok=null, cu=null, ltype='rent', photos=[], editId=null;

window.addEventListener('DOMContentLoaded', async () => {
  // ✅ Must be signed in to list property
  const s=await getSession(); if(!s){window.location.href='/login.html';return;}
  cu=s.user; tok=s.access_token;
  document.getElementById('al').style.display='none';
  document.getElementById('page').style.display='block';
  await initNavbar({active:'list'});

  try{
    const r=await fetch('/api/profiles/me',{headers:{Authorization:`Bearer ${tok}`}});
    if(r.ok){
      const p=await r.json();
      if(p.fullname) document.getElementById('contact_name').value=p.fullname;
      if(p.phone)    document.getElementById('contact_phone').value=p.phone;
    }
  }catch(e){}

  editId=new URLSearchParams(window.location.search).get('edit');
  if(editId){
    document.getElementById('page-title').textContent='Edit Listing';
    document.getElementById('sub-btn').textContent='💾 Save Changes';
    try{
      const r=await fetch(`/api/properties/${editId}`);
      const p=await r.json();
      if(p.listed_by!==cu.id){toast('Not your listing');return;}
      setType(p.type||'rent');
      ['title','city','locality','address','description','price','deposit','maintenance',
       'area','carpet_area','floor','furnished','available_from','contact_name',
       'contact_phone','contact_email','contact_role','contact_time','prop_type','bhk','bathrooms'
      ].forEach(k=>{const el=document.getElementById(k);if(el&&p[k]!=null)el.value=p[k];});
      ['parking','gym','pool','lift','security','cctv','clubhouse','garden','powerbackup',
       'ac','balcony','modular_kitchen','washing_machine','fridge','wifi','pet_friendly',
       'gated','vastu','water_24','no_brokerage'
      ].forEach(k=>{
        if(p[k]){
          const el=document.getElementById(k);
          if(el){el.checked=true;document.getElementById('ci-'+k)?.classList.add('checked');}
        }
      });
      photos=[...(p.photos||[])]; renderPhotos();
    }catch(e){toast('Failed to load listing');}
  }
});

function setType(t){
  ltype=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('sel',b.dataset.t===t));
}
function tgl(k){
  const c=document.getElementById(k)?.checked;
  document.getElementById('ci-'+k)?.classList.toggle('checked',!!c);
}
function pickPhoto(){document.getElementById('file-inp').click();}

async function handleFiles(e){
  const files=Array.from(e.target.files||[]); e.target.value='';
  const avail=10-photos.length;
  if(avail<=0){toast('Max 10 photos');return;}
  const toUp=files.slice(0,avail);
  document.getElementById('upload-status').textContent=`Uploading ${toUp.length} photo(s)…`;
  for(const f of toUp){
    try{
      const fd=new FormData(); fd.append('file',f);
      const r=await fetch('/api/upload',{method:'POST',headers:{Authorization:`Bearer ${tok}`},body:fd});
      if(!r.ok) throw new Error(await r.text());
      const {url}=await r.json(); photos.push(url); renderPhotos();
    }catch(ex){toast('Upload failed: '+f.name);}
  }
  document.getElementById('upload-status').textContent=photos.length?`${photos.length} photo(s) ready`:'';
}

function renderPhotos(){
  const g=document.getElementById('photos-grid');
  g.innerHTML=photos.map((url,i)=>`
    <div class="photo-slot">
      <img src="${url}" alt="photo ${i+1}" loading="lazy"/>
      ${i===0?`<div style="position:absolute;bottom:4px;left:4px;background:var(--primary);color:#fff;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700">COVER</div>`:''}
      <div class="photo-rm" onclick="rmPhoto(${i})">✕</div>
    </div>`).join('');
  if(photos.length<10) g.insertAdjacentHTML('beforeend','<div class="photo-slot" onclick="pickPhoto()">➕</div>');
}
function rmPhoto(i){photos.splice(i,1);renderPhotos();}

async function submit(){
  const V=id=>document.getElementById(id)?.value?.trim()||'';

  // ✅ Validate required fields
  if(!V('title')||!V('price')||!V('city')||!V('locality')||!V('contact_name')){
    toast('Fill in all required (*) fields'); return;
  }

  // ✅ Mobile number mandatory validation
  if(!V('contact_phone')){
    const ph=document.getElementById('contact_phone');
    ph.classList.add('required-highlight');
    ph.focus();
    toast('📱 Mobile number is required to publish your listing');
    setTimeout(()=>ph.classList.remove('required-highlight'),3000);
    return;
  }
  if(!/^[6-9]\d{9}$/.test(V('contact_phone'))){
    const ph=document.getElementById('contact_phone');
    ph.classList.add('required-highlight');
    ph.focus();
    toast('Enter a valid 10-digit Indian mobile number (starts with 6-9)');
    setTimeout(()=>ph.classList.remove('required-highlight'),3000);
    return;
  }

  const btn=document.getElementById('sub-btn'); btn.disabled=true; btn.textContent='Publishing…';
  const bools=['parking','gym','pool','lift','security','cctv','clubhouse','garden','powerbackup',
    'ac','balcony','modular_kitchen','washing_machine','fridge','wifi','pet_friendly',
    'gated','vastu','water_24','no_brokerage'];
  const payload={
    type:ltype,
    property_type:V('prop_type'),
    bhk:V('bhk')?parseInt(V('bhk')):null,
    bathrooms:V('bathrooms')?parseInt(V('bathrooms')):null,
    title:V('title'), city:V('city'), locality:V('locality'), address:V('address'),
    description:V('description'),
    price:parseFloat(V('price')),
    deposit:V('deposit')?parseFloat(V('deposit')):null,
    maintenance:V('maintenance')?parseFloat(V('maintenance')):null,
    area:V('area')?parseInt(V('area')):null,
    carpet_area:V('carpet_area')?parseInt(V('carpet_area')):null,
    floor:V('floor'), furnished:V('furnished'), available_from:V('available_from'),
    contact_name:V('contact_name'), contact_phone:V('contact_phone'),
    contact_email:V('contact_email'), contact_role:V('contact_role'),
    contact_time:V('contact_time'), photos,
  };
  bools.forEach(k=>payload[k]=!!document.getElementById(k)?.checked);

  try{
    const url=editId?`/api/properties/${editId}`:'/api/properties';
    const method=editId?'PATCH':'POST';
    const r=await fetch(url,{
      method,
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${tok}`},
      body:JSON.stringify(payload)
    });
    if(!r.ok){const e=await r.json();throw new Error(e.error||'Failed');}
    const d=await r.json();
    toast(editId?'✅ Listing updated!':'✅ Listing published!');
    setTimeout(()=>window.location.href=`/property.html?id=${d.id}`,1000);
  }catch(e){
    toast('Error: '+e.message);
    btn.disabled=false;
    btn.textContent=editId?'💾 Save Changes':'🏠 Publish Listing';
  }
}

function toast(m){
  const el=document.getElementById('toast-el');
  el.textContent=m; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
</body>
</html>
