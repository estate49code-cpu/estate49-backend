<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <script src="/nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #c0392b; --primary-dark: #a93226; --primary-light: #fadbd8;
      --bg: #ffffff; --bg-secondary: #f7f7f8; --bg-tertiary: #ececf1;
      --border: #e5e5e5; --text: #0d0d0d; --muted: #6e6e80; --radius: 14px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-secondary); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .auth-loading {
      position: fixed; inset: 0; background: white;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 9999;
    }
    .al-icon { width: 56px; height: 56px; background: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .al-spin { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }

    .safety-bar {
      background: #fff8e1; border-bottom: 1px solid #ffe082;
      padding: 8px 24px; font-size: 12px; color: #7b5800;
      display: flex; align-items: center; gap: 8px;
    }

    .msg-layout {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── Sidebar (conversation list) ── */
    .conv-sidebar {
      width: 300px; flex-shrink: 0;
      background: white; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .conv-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      font-size: 16px; font-weight: 700; color: var(--text);
    }
    .conv-search {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    .conv-search input {
      width: 100%; padding: 8px 12px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 13px; font-family: inherit;
      outline: none; background: var(--bg-secondary); color: var(--text);
    }
    .conv-search input:focus { border-color: var(--primary); }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid var(--bg-secondary);
    }
    .conv-item:hover { background: var(--bg-secondary); }
    .conv-item.active { background: var(--primary-light); }
    .conv-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .conv-time { font-size: 11px; color: var(--muted); }
    .conv-unread {
      background: var(--primary); color: white;
      font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
      border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }

    .conv-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; padding: 40px 24px;
    }
    .conv-empty-icon { font-size: 48px; }
    .conv-empty-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .conv-empty-sub { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6; }
    .conv-empty-btn {
      margin-top: 8px; padding: 10px 20px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .conv-empty-btn:hover { background: var(--primary-dark); }

    /* ── Chat panel ── */
    .chat-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    .chat-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; background: white;
    }
    .chat-header-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .chat-header-prop { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-bubble-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-bubble-row.mine { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 68%; padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.6; word-break: break-word;
    }
    .msg-bubble.theirs { background: var(--bg-tertiary); color: var(--text); border-bottom-left-radius: 4px; }
    .msg-bubble.mine { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; color: var(--muted); margin-bottom: 2px; }

    .chat-input-area {
      padding: 12px 20px 16px; background: white; border-top: 1px solid var(--border);
    }
    .chat-input-box {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--bg-secondary); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 10px 12px;
      transition: border-color 0.2s;
    }
    .chat-input-box:focus-within { border-color: var(--primary); }
    .chat-input-box textarea {
      flex: 1; border: none; background: transparent; outline: none; resize: none;
      font-size: 14px; font-family: inherit; color: var(--text);
      max-height: 120px; min-height: 22px; line-height: 1.5;
    }
    .chat-input-box textarea::placeholder { color: var(--muted); }
    .chat-send-btn {
      width: 36px; height: 36px; border: none; border-radius: 10px;
      background: var(--primary); color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .chat-send-btn:hover { background: var(--primary-dark); }
    .chat-send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .no-chat-selected {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; padding: 40px;
    }
    .no-chat-icon { font-size: 64px; }
    .no-chat-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .no-chat-sub { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.6; max-width: 340px; }

    .chat-msg-loading { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; padding: 20px; }
    .spin-sm { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }

    @media (max-width: 768px) {
      .conv-sidebar { width: 100%; }
      .chat-panel { display: none; }
      .chat-panel.mobile-open { display: flex; position: fixed; inset: 0; z-index: 300; }
      .conv-sidebar.mobile-hidden { display: none; }
    }
  </style>
</head>
<body>

<div class="auth-loading" id="auth-loading">
  <div class="al-icon">🏠</div>
  <div class="al-spin"></div>
  <p style="font-size:14px;color:#6e6e80">Loading...</p>
</div>

<div id="navbar-root"></div>

<div class="page" id="page">

  <div class="safety-bar">
    ⚠️ <strong>Stay Safe:</strong> Never share OTPs, bank details or passwords. Meet only in public places. Report suspicious users via our support.
    <button onclick="this.parentElement.style.display='none'" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:16px;color:#7b5800">✕</button>
  </div>

  <div class="msg-layout">

    <!-- Conversation list sidebar -->
    <div class="conv-sidebar" id="conv-sidebar">
      <div class="conv-header">Messages</div>
      <div class="conv-search">
        <input type="text" id="conv-search" placeholder="Search conversations..." oninput="filterConversations()" />
      </div>
      <div class="conv-list" id="conv-list">
        <div style="display:flex;align-items:center;gap:8px;padding:20px;color:#6e6e80;font-size:13px">
          <div class="spin-sm"></div> Loading conversations...
        </div>
      </div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel" id="chat-panel">
      <div class="no-chat-selected" id="no-chat">
        <div class="no-chat-icon">💬</div>
        <div class="no-chat-title">Your Messages</div>
        <div class="no-chat-sub">Select a conversation or contact a property owner from any listing page.</div>
      </div>

      <div id="active-chat" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-header">
          <div class="chat-header-avatar" id="chat-avatar">?</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-name">Loading...</div>
            <div class="chat-header-prop" id="chat-prop"></div>
          </div>
          <button onclick="window.history.back()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#6e6e80" title="Back">←</button>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="chat-msg-loading"><div class="spin-sm"></div> Loading messages...</div>
        </div>
        <div class="chat-input-area">
          <div class="chat-input-box">
            <textarea id="msg-input" placeholder="Type a message..." rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
              oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button class="chat-send-btn" id="send-btn" onclick="sendMessage()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  let currentUser = null;
  let token       = null;
  let conversations = [];
  let activeConv  = null;
  let pollTimer   = null;

  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const session = await getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      currentUser = session.user;
      token       = session.access_token;

      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('page').style.display = 'flex';

      await initNavbar({ active: 'messages' });
      await loadConversations();

      // Auto-open conversation if URL params present
      const params = new URLSearchParams(window.location.search);
      const toUser = params.get('with') || params.get('to');
      const propId = params.get('property') || params.get('listing');
      if (toUser) {
        openOrCreateConversation(toUser, propId);
      }
    } catch (e) {
      console.error(e);
      window.location.href = '/login.html';
    }
  });

  async function loadConversations() {
    try {
      const res = await fetch('/api/messages/conversations', {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Failed');
      conversations = await res.json();
      renderConversations(conversations);
    } catch (e) {
      conversations = [];
      renderConversations([]);
    }
  }

  function renderConversations(list) {
    const el = document.getElementById('conv-list');
    if (!list.length) {
      el.innerHTML = `
        <div class="conv-empty">
          <div class="conv-empty-icon">💬</div>
          <div class="conv-empty-title">No conversations yet</div>
          <div class="conv-empty-sub">Browse listings and contact a property owner to start chatting.</div>
          <button class="conv-empty-btn" onclick="window.location.href='/browse.html'">Browse listings</button>
        </div>`;
      return;
    }
    el.innerHTML = list.map(c => `
      <div class="conv-item ${activeConv?.id === c.id ? 'active' : ''}" onclick="openConversation(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="conv-avatar">${getInitials(c.other_user_id)}</div>
        <div class="conv-info">
          <div class="conv-name">${esc(c.property?.title || 'Property Chat')}</div>
          <div class="conv-preview">${esc(c.last_message || 'Start a conversation')}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${c.last_message_at ? timeAgo(c.last_message_at) : ''}</div>
          ${c.unread_count > 0 ? `<div class="conv-unread">${c.unread_count}</div>` : ''}
        </div>
      </div>`).join('');
  }

  function filterConversations() {
    const q = document.getElementById('conv-search').value.trim().toLowerCase();
    if (!q) { renderConversations(conversations); return; }
    renderConversations(conversations.filter(c =>
      (c.property?.title || '').toLowerCase().includes(q) ||
      (c.last_message || '').toLowerCase().includes(q)
    ));
  }

  function openConversation(conv) {
    activeConv = conv;
    renderConversations(conversations); // re-render to highlight active

    document.getElementById('no-chat').style.display = 'none';
    const ac = document.getElementById('active-chat');
    ac.style.display = 'flex';
    ac.style.flexDirection = 'column';

    document.getElementById('chat-avatar').textContent = getInitials(conv.other_user_id);
    document.getElementById('chat-name').textContent = conv.property?.title || 'Chat';
    document.getElementById('chat-prop').textContent =
      conv.property ? `${conv.property.locality || ''}${conv.property.city ? ', '+conv.property.city : ''}` : '';

    loadMessages(conv);

    // Poll for new messages every 4s
    clearInterval(pollTimer);
    pollTimer = setInterval(() => loadMessages(conv), 4000);
  }

  async function openOrCreateConversation(otherUserId, propertyId) {
    // Look for existing conversation
    const existing = conversations.find(c =>
      c.other_user_id === otherUserId && (!propertyId || String(c.property_id) === String(propertyId))
    );
    if (existing) { openConversation(existing); return; }

    // Create a virtual conv object
    let prop = null;
    if (propertyId) {
      try {
        const r = await fetch(`/api/properties/${propertyId}`);
        if (r.ok) prop = await r.json();
      } catch(_) {}
    }
    const conv = {
      id: `${propertyId||'general'}_${otherUserId}`,
      property_id: propertyId || null,
      property: prop,
      other_user_id: otherUserId,
      last_message: '',
      last_message_at: null,
      unread_count: 0
    };
    conversations.unshift(conv);
    renderConversations(conversations);
    openConversation(conv);
  }

  async function loadMessages(conv) {
    if (!conv) return;
    try {
      const params = new URLSearchParams();
      if (conv.property_id) params.set('property_id', conv.property_id);
      params.set('with', conv.other_user_id);

      const res = await fetch(`/api/messages?${params}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Failed');
      const msgs = await res.json();
      renderMessages(msgs);
    } catch (e) {
      document.getElementById('chat-messages').innerHTML =
        '<p style="text-align:center;color:#6e6e80;font-size:13px;padding:20px">Could not load messages.</p>';
    }
  }

  function renderMessages(msgs) {
    const el = document.getElementById('chat-messages');
    const wasAtBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 60;

    if (!msgs.length) {
      el.innerHTML = '<p style="text-align:center;color:#6e6e80;font-size:13px;padding:40px">No messages yet. Say hello! 👋</p>';
      return;
    }

    el.innerHTML = msgs.map(m => {
      const mine = m.sender_id === currentUser.id;
      return `
        <div class="msg-bubble-row ${mine ? 'mine' : ''}">
          <div class="msg-bubble ${mine ? 'mine' : 'theirs'}">${esc(m.content)}</div>
          <div class="msg-time">${m.created_at ? timeAgo(m.created_at) : ''}</div>
        </div>`;
    }).join('');

    if (wasAtBottom) el.scrollTop = el.scrollHeight;
  }

  async function sendMessage() {
    if (!activeConv) return;
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content) return;

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    try {
      const res = await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({
          receiver_id: activeConv.other_user_id,
          property_id: activeConv.property_id || undefined,
          content
        })
      });
      if (!res.ok) throw new Error('Failed to send');
      await loadMessages(activeConv);
    } catch (e) {
      alert('Failed to send message. Please try again.');
      input.value = content;
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  function getInitials(userId) {
    if (!userId) return '?';
    return (userId.slice(0, 2)).toUpperCase();
  }

  function esc(t) {
    return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeAgo(d) {
    const diff = Date.now() - new Date(d).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1)  return 'just now';
    if (min < 60) return `${min}m ago`;
    const h = Math.floor(min / 60);
    if (h < 24)   return `${h}h ago`;
    const days = Math.floor(h / 24);
    if (days < 7) return `${days}d ago`;
    return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  }
</script>
</body>
</html>
