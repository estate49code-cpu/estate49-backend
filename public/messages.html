<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script>
  <script src="/nav.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#c0392b;--primary-dark:#a93226;--primary-light:#fadbd8;--bg:#f7f7f8;--card:#fff;--border:#e5e5e5;--text:#0d0d0d;--muted:#6e6e80}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
    .auth-loading{position:fixed;inset:0;background:white;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999}
    .al-icon{width:56px;height:56px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px}
    .al-spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .page{display:none;flex-direction:column;flex:1;overflow:hidden}
    /* Safety banner */
    .safety-banner{background:#fff3e0;border-bottom:1px solid #ffe0b2;padding:10px 24px;display:flex;align-items:center;gap:10px;font-size:13px;color:#e65100}
    .safety-banner strong{font-weight:700}
    .safety-close{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:#e65100;padding:0 4px}
    /* Layout */
    .msg-layout{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden}
    /* Thread list */
    .thread-list{border-right:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;overflow:hidden}
    .thread-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:16px;font-weight:700}
    .thread-items{flex:1;overflow-y:auto}
    .thread-item{padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s;display:flex;align-items:flex-start;gap:12px}
    .thread-item:hover{background:var(--bg)}
    .thread-item.active{background:var(--primary-light)}
    .thread-avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
    .thread-info{flex:1;min-width:0}
    .thread-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .thread-prop{font-size:11px;color:var(--primary);font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .thread-last{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .thread-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .thread-time{font-size:10px;color:var(--muted)}
    .thread-unread{background:var(--primary);color:white;border-radius:10px;font-size:10px;font-weight:700;padding:2px 6px;min-width:18px;text-align:center}
    .thread-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px}
    /* Chat area */
    .chat-area{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
    .chat-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted)}
    .chat-placeholder-icon{font-size:48px}
    /* Chat header */
    .chat-header{padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .chat-header-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
    .chat-header-info{}
    .chat-header-name{font-size:14px;font-weight:700;color:var(--text)}
    .chat-header-prop{font-size:12px;color:var(--primary);cursor:pointer}
    .chat-header-prop:hover{text-decoration:underline}
    /* Messages */
    .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
    .chat-messages::-webkit-scrollbar{width:4px}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .msg-row{display:flex;gap:8px;align-items:flex-end}
    .msg-row.mine{flex-direction:row-reverse}
    .msg-bubble{max-width:70%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word}
    .msg-row.mine  .msg-bubble{background:var(--primary);color:white;border-bottom-right-radius:4px}
    .msg-row.other .msg-bubble{background:white;color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
    .msg-time{font-size:10px;color:var(--muted);margin-bottom:2px;white-space:nowrap}
    .msg-row.mine .msg-time{text-align:right}
    .msg-date-sep{text-align:center;font-size:11px;color:var(--muted);margin:8px 0;background:var(--bg);display:flex;align-items:center;gap:8px}
    .msg-date-sep::before,.msg-date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
    /* Input */
    .chat-input-wrap{padding:16px 20px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
    .chat-input{flex:1;border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;font-size:14px;font-family:inherit;resize:none;outline:none;max-height:120px;min-height:48px;transition:border-color 0.2s;background:var(--bg)}
    .chat-input:focus{border-color:var(--primary);background:white}
    .chat-send{width:48px;height:48px;background:var(--primary);color:white;border:none;border-radius:14px;font-size:20px;cursor:pointer;flex-shrink:0;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
    .chat-send:hover{background:var(--primary-dark);transform:scale(1.05)}
    .chat-send:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:500;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:700px){.msg-layout{grid-template-columns:1fr}.thread-list{display:none}.thread-list.show{display:flex;position:fixed;inset:0;z-index:50;top:60px}}
  </style>
</head>
<body>
<div class="auth-loading" id="auth-loading"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>

  <!-- Safety Banner -->
  <div class="safety-banner" id="safety-banner">
    🛡️ <div><strong>Stay Safe:</strong> Never share OTPs, bank details or passwords. Meet only in public places. Report suspicious users via our support.</div>
    <button class="safety-close" onclick="document.getElementById('safety-banner').style.display='none'">✕</button>
  </div>

  <div class="msg-layout">
    <!-- Thread list -->
    <div class="thread-list" id="thread-list">
      <div class="thread-header">💬 Messages</div>
      <div class="thread-items" id="thread-items">
        <div class="thread-empty">Loading conversations...</div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area">
      <div class="chat-placeholder" id="chat-placeholder">
        <div class="chat-placeholder-icon">💬</div>
        <div style="font-size:16px;font-weight:600;color:var(--text)">Your Messages</div>
        <div style="font-size:13px;text-align:center;max-width:280px">Select a conversation or contact a property owner from any listing page.</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast-el"></div>
<script>
  let currentUser = null;
  let activeThread = null;
  let pollTimer = null;

  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const session = await getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      currentUser = session.user;
      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('page').style.display = 'flex';
      await initNavbar({ active: 'messages' });
      await loadThreads();

      // Open thread from URL params
      const p = new URLSearchParams(window.location.search);
      if (p.get('property') && p.get('with')) {
        openChat(p.get('property'), p.get('with'));
      }
    } catch(e) { window.location.href = '/login.html'; }
  });

  async function loadThreads() {
    try {
      const res  = await fetch(`/api/messages/inbox/${currentUser.id}`);
      const data = await res.json();
      const el   = document.getElementById('thread-items');

      if (!data.length) {
        el.innerHTML = `<div class="thread-empty">No conversations yet.<br/><br/>Contact a property owner from any listing to start chatting.</div>`;
        return;
      }

      el.innerHTML = data.map(t => {
        const otherId   = t.sender_id === currentUser.id ? t.receiver_id : t.sender_id;
        const otherName = t.sender_id === currentUser.id ? (t.properties?.contact_name || 'Owner') : t.sender_name;
        const initials  = (otherName||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
        const propTitle = t.properties?.title || 'Property';
        const timeStr   = formatTime(t.created_at);

        return `<div class="thread-item" id="thread-${t.property_id}-${otherId}" onclick="openChat('${t.property_id}','${otherId}','${esc(otherName)}','${esc(propTitle)}')">
          <div class="thread-avatar">${initials}</div>
          <div class="thread-info">
            <div class="thread-name">${esc(otherName)}</div>
            <div class="thread-prop">🏠 ${esc(propTitle.slice(0,30))}</div>
            <div class="thread-last">${esc(t.message?.slice(0,40) || '')}</div>
          </div>
          <div class="thread-meta">
            <span class="thread-time">${timeStr}</span>
            ${t.unread > 0 ? `<span class="thread-unread">${t.unread}</span>` : ''}
          </div>
        </div>`;
      }).join('');
    } catch(e) {}
  }

  async function openChat(propertyId, otherId, otherName, propTitle) {
    if (pollTimer) clearInterval(pollTimer);
    activeThread = { propertyId, otherId, otherName, propTitle };

    // Mark active
    document.querySelectorAll('.thread-item').forEach(t => t.classList.remove('active'));
    document.getElementById(`thread-${propertyId}-${otherId}`)?.classList.add('active');

    // Mark as read
    await fetch('/api/messages/read', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ property_id: propertyId, receiver_id: currentUser.id, sender_id: otherId })
    }).catch(()=>{});

    const initials = (otherName||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);

    document.getElementById('chat-area').innerHTML = `
      <div class="chat-header">
        <div class="chat-header-avatar">${initials}</div>
        <div class="chat-header-info">
          <div class="chat-header-name">${esc(otherName || 'User')}</div>
          <div class="chat-header-prop" onclick="window.location.href='/property.html?id=${propertyId}'">🏠 ${esc((propTitle||'View Property').slice(0,40))}</div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="chat-send" id="send-btn" onclick="sendMessage()">➤</button>
      </div>`;

    await fetchMessages();
    pollTimer = setInterval(fetchMessages, 4000);
  }

  async function fetchMessages() {
    if (!activeThread) return;
    try {
      const res  = await fetch(`/api/messages/${activeThread.propertyId}?user1=${currentUser.id}&user2=${activeThread.otherId}`);
      const msgs = await res.json();
      const el   = document.getElementById('chat-messages');
      if (!el) return;

      const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
      let lastDate = '';

      el.innerHTML = msgs.map(m => {
        const mine    = m.sender_id === currentUser.id;
        const dateStr = new Date(m.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
        const timeStr = new Date(m.created_at).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
        let sep = '';
        if (dateStr !== lastDate) { sep = `<div class="msg-date-sep">${dateStr}</div>`; lastDate = dateStr; }

        return `${sep}<div class="msg-row ${mine?'mine':'other'}">
          <div style="display:flex;flex-direction:column;gap:2px">
            <div class="msg-time">${timeStr}</div>
            <div class="msg-bubble">${esc(m.message)}</div>
          </div>
        </div>`;
      }).join('');

      if (atBottom || msgs.length <= 1) el.scrollTop = el.scrollHeight;
    } catch(e) {}
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const btn   = document.getElementById('send-btn');
    const msg   = input?.value.trim();
    if (!msg || !activeThread) return;

    input.value = ''; input.style.height = 'auto';
    btn.disabled = true;

    try {
      const myName = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
      await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          property_id:  activeThread.propertyId,
          sender_id:    currentUser.id,
          receiver_id:  activeThread.otherId,
          sender_name:  myName,
          message:      msg
        })
      });
      await fetchMessages();
    } catch(e) { toast('❌ Failed to send'); input.value = msg; }
    btn.disabled = false;
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 86400000) return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    if (diff < 604800000) return d.toLocaleDateString('en-IN', { weekday: 'short' });
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
  }

  function esc(t){ return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
  function toast(msg){ const el=document.getElementById('toast-el'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }
</script>
</body>
</html>
