<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Signing in... — Estate49</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f7f6f2;}
    .icon{font-size:52px;margin-bottom:16px;}
    .spin{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#01696f;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{color:#555;font-size:15px;}
    .err{color:#c0392b;font-size:14px;margin-top:12px;display:none;}
  </style>
</head>
<body>
  <div class="icon">🏠</div>
  <div class="spin"></div>
  <p>Completing sign in...</p>
  <p class="err" id="err"></p>

<script>
const SUPABASE_URL  = 'https://qbbxdtbfxlliqxxlaoed.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiYnhkdGJmeGxsaXF4eGxhb2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzY0MzUsImV4cCI6MjA5MTUxMjQzNX0.g86SW28zVacKDKzb0bZcsJvGTQ1N7Ahy3Ib3DRNL90';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    autoRefreshToken: true,
    persistSession: true,
    detectSessionInUrl: true
  }
});

async function handleCallback() {
  try {
    // Let Supabase auto-detect the token from the URL hash/query
    const { data, error } = await supabase.auth.getSession();

    if (error) throw error;

    if (data?.session) {
      // Session found — store and redirect
      localStorage.setItem('estate49_session', JSON.stringify(data.session));
      window.location.replace('/browse.html');
      return;
    }

    // If no session yet, try exchangeCodeForSession (PKCE flow)
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    if (code) {
      const { data: d2, error: e2 } = await supabase.auth.exchangeCodeForSession(code);
      if (e2) throw e2;
      if (d2?.session) {
        localStorage.setItem('estate49_session', JSON.stringify(d2.session));
        window.location.replace('/browse.html');
        return;
      }
    }

    // Hash-based token (implicit flow)
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      // Supabase JS v2 auto-handles hash — just wait a moment
      setTimeout(async () => {
        const { data: d3 } = await supabase.auth.getSession();
        if (d3?.session) {
          localStorage.setItem('estate49_session', JSON.stringify(d3.session));
          window.location.replace('/browse.html');
        } else {
          showErr('Session not found. Please try signing in again.');
        }
      }, 1500);
      return;
    }

    showErr('No auth token found. Please try signing in again.');
  } catch(e) {
    showErr(e.message || 'Sign in failed. Please try again.');
  }
}

function showErr(msg) {
  document.querySelector('.spin').style.display = 'none';
  document.querySelector('p').textContent = 'Sign in failed';
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => window.location.replace('/login.html'), 3000);
}

handleCallback();
</script>
</body>
</html>
