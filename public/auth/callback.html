<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Signing in... — Estate49</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f7f6f2;}
    .icon{font-size:52px;margin-bottom:16px;}
    .spin{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#c0392b;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{color:#555;font-size:15px;text-align:center;}
    .err{color:#c0392b;font-size:13px;margin-top:12px;display:none;text-align:center;padding:0 24px;}
  </style>
</head>
<body>
  <div class="icon">🏠</div>
  <div class="spin" id="spin"></div>
  <p id="msg">Completing sign in...</p>
  <p class="err" id="err"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL     = 'https://qbbxdtbfxlliqxxlaoed.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiYnhkdGJmeGxsaXF4eGxhb2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzY0MzUsImV4cCI6MjA5MTUxMjQzNX0.g86SW28zVacKDKzb0bZcsJvGTQ1N7Ahy3Ib3_DRNL90';

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    autoRefreshToken: true,
    persistSession: true,
    detectSessionInUrl: true,
    flowType: 'implicit'
  }
});

async function createProfile(session) {
  try {
    await fetch('/api/profiles/me', {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        fullname:   session.user.user_metadata?.full_name || session.user.email || '',
        avatar_url: session.user.user_metadata?.avatar_url || ''
      })
    });
  } catch(e) { /* non-fatal — profile upsert fails silently */ }
}

async function handleCallback() {
  try {
    // Parse hash manually for implicit flow: #access_token=...&refresh_token=...
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token  = params.get('access_token');
    const refresh_token = params.get('refresh_token');

    if (access_token) {
      const { data, error } = await client.auth.setSession({ access_token, refresh_token });
      if (error) throw error;
      if (data?.session) {
        localStorage.setItem('e49_session', JSON.stringify(data.session));
        await createProfile(data.session);
        window.location.replace('/browse.html');
        return;
      }
    }

    // Fallback: PKCE code in query string
    const qParams = new URLSearchParams(window.location.search);
    const code = qParams.get('code');
    if (code) {
      const { data, error } = await client.auth.exchangeCodeForSession(code);
      if (error) throw error;
      if (data?.session) {
        localStorage.setItem('e49_session', JSON.stringify(data.session));
        await createProfile(data.session);
        window.location.replace('/browse.html');
        return;
      }
    }

    // Last resort: let Supabase auto-detect
    await new Promise(r => setTimeout(r, 1000));
    const { data } = await client.auth.getSession();
    if (data?.session) {
      localStorage.setItem('e49_session', JSON.stringify(data.session));
      await createProfile(data.session);
      window.location.replace('/browse.html');
      return;
    }

    throw new Error('No session found. Please try signing in again.');

  } catch(e) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('msg').textContent = 'Sign in failed';
    const el = document.getElementById('err');
    el.textContent = e.message;
    el.style.display = 'block';
    setTimeout(() => window.location.replace('/login.html'), 3000);
  }
}

handleCallback();
</script>
</body>
</html>
