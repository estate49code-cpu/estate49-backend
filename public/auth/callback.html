<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Estate49 — Signing you in</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #f7f7f8;
    }
    .box { text-align: center; }
    .logo {
      width: 56px; height: 56px;
      background: #c0392b; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 20px;
      box-shadow: 0 4px 16px rgba(192,57,43,0.25);
    }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid #e5e5e5; border-top-color: #c0392b;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #6e6e80; font-size: 15px; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">🏠</div>
  <div class="spin"></div>
  <p>Signing you in to Estate49...</p>
</div>
<script src="/auth.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', async () => {
    // Wait briefly for Supabase to process the OAuth token from URL
    await new Promise(r => setTimeout(r, 1500));
    const session = await getSession();
    if (session) {
      window.location.href = '/';
    } else {
      window.location.href = '/login.html';
    }
  });
</script>
</body>
</html>
