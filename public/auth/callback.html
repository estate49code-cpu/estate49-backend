<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Signing in... — Estate49</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f7f6f2;}
    .icon{font-size:52px;margin-bottom:16px;}
    .spin{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#c0392b;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{color:#555;font-size:15px;}
    .err{color:#c0392b;font-size:14px;margin-top:12px;display:none;text-align:center;padding:0 24px;}
  </style>
</head>
<body>
  <div class="icon">🏠</div>
  <div class="spin" id="spin"></div>
  <p id="msg">Completing sign in...</p>
  <p class="err" id="err"></p>

<!-- Load Supabase ONCE here — do NOT load auth.js on this page -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://qbbxdtbfxlliqxxlaoed.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiYnhkdGJmeGxsaXF4eGxhb2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzY0MzUsImV4cCI6MjA5MTUxMjQzNX0.g86SW28zVacKDKzb0bZcsJvGTQ1N7Ahy3Ib3DRNL90';

// Use window.supabase from CDN — do NOT redeclare as const supabase
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    autoRefreshToken: true,
    persistSession: true,
    detectSessionInUrl: true
  }
});

async function handleCallback() {
  try {
    // Give Supabase a moment to process the URL hash/code
    await new Promise(r => setTimeout(r, 500));

    // Try getSession — Supabase auto-processes the hash
    const { data, error } = await client.auth.getSession();

    if (error) throw error;

    if (data?.session) {
      localStorage.setItem('e49_session', JSON.stringify(data.session));
      window.location.replace('/browse.html');
      return;
    }

    // PKCE flow — code in query params
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      const { data: d2, error: e2 } = await client.auth.exchangeCodeForSession(code);
      if (e2) throw e2;
      if (d2?.session) {
        localStorage.setItem('e49_session', JSON.stringify(d2.session));
        window.location.replace('/browse.html');
        return;
      }
    }

    // Wait a bit more and retry for hash-based implicit flow
    await new Promise(r => setTimeout(r, 1500));
    const { data: d3 } = await client.auth.getSession();
    if (d3?.session) {
      localStorage.setItem('e49_session', JSON.stringify(d3.session));
      window.location.replace('/browse.html');
      return;
    }

    throw new Error('Session not found after sign in.');

  } catch(e) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('msg').textContent = 'Sign in failed';
    const el = document.getElementById('err');
    el.textContent = e.message || 'Something went wrong. Redirecting to login...';
    el.style.display = 'block';
    setTimeout(() => window.location.replace('/login.html'), 3000);
  }
}

handleCallback();
</script>
</body>
</html>
