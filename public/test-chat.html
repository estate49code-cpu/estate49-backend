<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Estate49 – Find Your Home</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; }

    .header {
      background: #c0392b;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 22px; }
    .header p  { font-size: 13px; opacity: 0.85; }

    .chat-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
    }
    .bubble.user {
      background: #c0392b;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      background: white;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .bubble.bot strong { color: #111; }
    .bubble.bot em     { color: #555; font-style: italic; }

    .bubble.bot .inline-photo {
      display: block;
      max-width: 100%;
      border-radius: 8px;
      margin: 8px 0;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .bubble.bot .inline-photo:hover { opacity: 0.85; }

    .property-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 520px;
      align-self: flex-start;
    }

    .card-photos {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 4px;
      background: #f8f8f8;
    }
    .card-photos img {
      height: 140px;
      width: 200px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .no-photo {
      height: 100px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 13px;
    }

    .card-body  { padding: 12px; }
    .card-title { font-size: 16px; font-weight: bold; color: #c0392b; margin-bottom: 6px; }
    .card-row   { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

    .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .badge.rent         { background: #e8f5e9; color: #2e7d32; }
    .badge.sale         { background: #fff3e0; color: #e65100; }
    .badge.owner        { background: #e3f2fd; color: #1565c0; }
    .badge.broker       { background: #fce4ec; color: #ad1457; }
    .badge.builder      { background: #f3e5f5; color: #6a1b9a; }
    .badge.verified     { background: #e8f5e9; color: #2e7d32; }
    .badge.pending      { background: #fff9c4; color: #f57f17; }
    .badge.nobrokerage  { background: #e8f5e9; color: #2e7d32; }
    .badge.hasbrokerage { background: #ffebee; color: #b71c1c; }

    .card-detail        { font-size: 13px; color: #555; margin-bottom: 4px; }
    .card-detail strong { color: #333; }
    .card-price         { font-size: 20px; font-weight: bold; color: #c0392b; margin-bottom: 8px; }
    .card-divider       { height: 1px; background: #eee; margin: 8px 0; }

    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .card-btn {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-block;
    }
    .card-btn.call     { background: #c0392b; color: white; }
    .card-btn.whatsapp { background: #25d366; color: white; }
    .card-btn.map      { background: #1a73e8; color: white; }

    .brokerage-info {
      background: #fff8e1;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #5d4037;
      margin-top: 6px;
    }
    .nearby-info {
      background: #e8f5e9;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #1b5e20;
      margin-top: 8px;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 14px;
      background: white;
      border-radius: 12px;
      width: fit-content;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .typing span {
      width: 8px; height: 8px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    .input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 0 0;
      border-top: 1px solid #ddd;
    }
    #messageInput {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid #ccc;
      font-size: 15px;
      outline: none;
    }
    #messageInput:focus { border-color: #c0392b; }
    #sendBtn {
      background: #c0392b;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    #sendBtn:hover { background: #a93226; }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.show { display: flex; }
    #lightbox img  { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    #lightbox .close {
      position: absolute;
      top: 20px; right: 24px;
      font-size: 32px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>🏠 Estate49</h1>
      <p>Your smart real estate assistant</p>
    </div>
  </div>

  <div class="chat-wrap">
    <div id="chat"></div>
    <div class="input-bar">
      <input id="messageInput" type="text" placeholder="e.g. 2 BHK rent in Whitefield 560066" />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <div id="lightbox">
    <span class="close" id="lightboxClose">&times;</span>
    <img id="lightboxImg" src="" alt="Property Photo">
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket        = io();
    const chat          = document.getElementById('chat');
    const input         = document.getElementById('messageInput');
    const sendBtn       = document.getElementById('sendBtn');
    const lightbox      = document.getElementById('lightbox');
    const lightboxImg   = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    lightboxClose.onclick = () => lightbox.classList.remove('show');
    lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.classList.remove('show'); };
    function openLightbox(src) { lightboxImg.src = src; lightbox.classList.add('show'); }

    // ── Markdown + Supabase image renderer ───────────────────────────────────
    function renderMarkdown(raw) {
      if (!raw) return '';

      // Escape HTML first (XSS protection)
      let t = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Bold **text**
      t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      // Italic *text*
      t = t.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

      // Inline code `code`
      t = t.replace(/`([^`]+)`/g,
        '<code style="background:#f4f4f4;padding:1px 5px;border-radius:3px;font-size:13px;">$1</code>');

      // Supabase storage image URLs → real <img> tags
      t = t.replace(
        /(https?:\/\/[^\s&lt;]+\.supabase\.co\/storage\/v1\/object\/public\/[^\s&lt;]+\.(?:jpg|jpeg|png|webp))/gi,
        '<img class="inline-photo" src="$1" alt="Property photo" loading="lazy">'
      );

      // Newlines → <br>
      t = t.replace(/\n/g, '<br>');
      return t;
    }

    function addBubble(text, cls) {
      const div = document.createElement('div');
      div.className = 'bubble ' + cls;
      if (cls === 'bot') {
        div.innerHTML = renderMarkdown(text);
        div.querySelectorAll('.inline-photo').forEach(img => {
          img.addEventListener('click', () => openLightbox(img.src));
        });
      } else {
        div.textContent = text;
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typingIndicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
    function removeTyping() {
      const t = document.getElementById('typingIndicator');
      if (t) t.remove();
    }

    function formatPrice(price, type) {
      const f = '₹' + Number(price).toLocaleString('en-IN');
      return type === 'rent' ? f + '/month' : f;
    }

    function getBrokerageText(p) {
      if (!p.brokerage_type || p.brokerage_type === 'none') return 'No Brokerage';
      if (p.brokerage_type === 'one_month_rent') return '1 Month Rent Brokerage';
      if (p.brokerage_type === 'fixed')
        return 'Brokerage: ₹' + Number(p.brokerage_amount || 0).toLocaleString('en-IN');
      if (p.brokerage_type === 'percentage')
        return 'Brokerage: ' + (p.brokerage_amount || 0) + '%';
      return 'Brokerage details available';
    }

    function showPropertyCard(p) {
      const card = document.createElement('div');
      card.className = 'property-card';

      const photos = Array.isArray(p.photos)
        ? p.photos.map(ph => String(ph).replace(/^"|"$/g, '').trim()).filter(Boolean)
        : [];

      const photosHTML = photos.length > 0
        ? '<div class="card-photos">' +
            photos.map(ph => '<img src="' + ph + '" alt="Property photo" loading="lazy">').join('') +
          '</div>'
        : '<div class="no-photo">No photos available</div>';

      const typeBadge =
        '<span class="badge ' + p.property_type + '">' +
        (p.property_type === 'rent' ? '🔑 Rent' : '🏷️ Sale') + '</span>';

      let sourceBadge = '';
      if (p.listing_source === 'owner')
        sourceBadge = '<span class="badge owner">👤 Owner</span>';
      else if (p.listing_source === 'broker')
        sourceBadge = '<span class="badge broker">🤝 Broker</span>';
      else if (p.listing_source === 'builder')
        sourceBadge = '<span class="badge builder">🏗️ Builder</span>';

      const verifyBadge = p.verification_status === 'verified'
        ? '<span class="badge verified">✅ Verified</span>'
        : '<span class="badge pending">⏳ Pending</span>';

      const brokerageText = getBrokerageText(p);
      const brokerageBadge = (!p.brokerage_type || p.brokerage_type === 'none')
        ? '<span class="badge nobrokerage">✅ No Brokerage</span>'
        : '<span class="badge hasbrokerage">⚠️ Brokerage</span>';

      const phone = p.contact_phone || p.owner_phone || '';
      const wa    = p.owner_whatsapp || phone;

      const callBtn = phone
        ? '<a class="card-btn call" href="tel:' + phone + '">📞 Call</a>' : '';
      const waBtn = wa
        ? '<a class="card-btn whatsapp" href="https://wa.me/91' + wa +
          '" target="_blank">💬 WhatsApp</a>' : '';
      const mapBtn = p.google_map_link
        ? '<a class="card-btn map" href="' + p.google_map_link +
          '" target="_blank">🗺️ Map</a>' : '';

      const extras = [
        p.area_sqft                       ? '📐 ' + p.area_sqft + ' sq.ft' : '',
        p.furnishing                      ? '🛋️ ' + p.furnishing           : '',
        p.parking && p.parking !== 'none' ? '🚗 ' + p.parking              : '',
        p.available_from                  ? '📅 From ' + p.available_from  : ''
      ].filter(Boolean).join(' • ');

      const location = [p.locality, p.city, p.pincode].filter(Boolean).join(', ');

      card.innerHTML =
        photosHTML +
        '<div class="card-body">' +
          '<div class="card-title">'  + (p.title || 'Property') + '</div>' +
          '<div class="card-row">'    + typeBadge + sourceBadge + verifyBadge + '</div>' +
          '<div class="card-price">'  + formatPrice(p.price, p.property_type) + '</div>' +
          '<div class="card-detail">📍 ' + location + '</div>' +
          (p.address  ? '<div class="card-detail">🏠 ' + p.address           + '</div>' : '') +
          (p.landmark ? '<div class="card-detail">🚩 Near: ' + p.landmark    + '</div>' : '') +
          (p.bhk      ? '<div class="card-detail">🛏️ <strong>' + p.bhk + ' BHK</strong></div>' : '') +
          (extras     ? '<div class="card-detail" style="margin-top:4px;">'  + extras + '</div>' : '') +
          '<div class="card-divider"></div>' +
          '<div class="card-row">' + brokerageBadge + '</div>' +
          '<div class="brokerage-info">ℹ️ ' + brokerageText +
            '. Confirm with the ' + (p.listing_source || 'contact') + ' before visiting.</div>' +
          (p.nearby_advice
            ? '<div class="nearby-info">📍 ' + p.nearby_advice + '</div>' : '') +
          '<div class="card-detail" style="margin-top:8px;">👤 Contact: <strong>' +
            (p.contact_name || 'N/A') + '</strong>' +
            (phone ? ' — ' + phone : '') + '</div>' +
          '<div class="card-actions">' + callBtn + waBtn + mapBtn + '</div>' +
        '</div>';

      card.querySelectorAll('.card-photos img').forEach(img => {
        img.addEventListener('click', () => openLightbox(img.src));
      });

      chat.appendChild(card);
      chat.scrollTop = chat.scrollHeight;
    }

    // ── Socket events ─────────────────────────────────────────────────────────
    socket.on('connect',    () => addBubble('Connected to Estate49 ✅', 'bot'));
    socket.on('disconnect', () => addBubble('Disconnected from server ❌', 'bot'));

    socket.on('typing', (isTyping) => {
      if (isTyping) showTyping();
      else removeTyping();
    });

    socket.on('bot_reply', (data) => {
      removeTyping();
      if (data.message) addBubble(data.message, 'bot');
      if (data.properties && data.properties.length > 0) {
        data.properties.forEach(p => showPropertyCard(p));
      }
    });

    // ── Send ──────────────────────────────────────────────────────────────────
    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addBubble(text, 'user');
      showTyping();
      socket.emit('user_message', { message: text });
      input.value = '';
    }
    sendBtn.onclick = sendMessage;
    input.addEventListener('keyup', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
