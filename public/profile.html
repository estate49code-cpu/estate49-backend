<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — Estate49</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth.js"></script><script src="/nav.js"></script>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .pw{max-width:860px;margin:0 auto;padding:36px 24px;}
    .ptabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);}
    .ptab{padding:10px 18px;font-size:var(--text-sm);font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all var(--transition);margin-bottom:-1px;background:none;border-left:none;border-right:none;border-top:none;cursor:pointer;}
    .ptab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .psec{display:none;}.psec.active{display:block;}
    .pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;margin-bottom:20px;}
    .avatar-row{display:flex;align-items:center;gap:20px;margin-bottom:28px;}
    .p-avatar{width:80px;height:80px;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;font-weight:800;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
    .p-avatar img{width:100%;height:100%;object-fit:cover;}
    .p-name{font-size:var(--text-xl);font-weight:800;}
    .p-email{font-size:var(--text-sm);color:var(--muted);}
    .form-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .lcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;transition:all var(--transition);}
    .lcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
    .lc-img{height:160px;background:var(--surface-3);position:relative;overflow:hidden;}
    .lc-img img{width:100%;height:100%;object-fit:cover;}
    .lc-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;}
    .lc-body{padding:12px;}
    .lc-price{font-size:var(--text-lg);font-weight:800;color:var(--primary);}
    .lc-title{font-size:var(--text-sm);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
    .lc-loc{font-size:var(--text-xs);color:var(--muted);margin-bottom:8px;}
    .status-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--divider);}
    .sbadge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .sbadge.pending{background:#fff3cd;color:#856404;}
    .sbadge.approved{background:#d4edda;color:#155724;}
    .sbadge.rejected{background:#f8d7da;color:#721c24;}
    .admin-note{font-size:11px;color:#721c24;padding:6px 12px;background:#fff5f5;border-top:1px solid #f8d7da;display:flex;gap:6px;align-items:flex-start;}
    .lc-acts{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--divider);}
    @media(max-width:768px){
      .pw{padding:14px 14px 80px;}
      .pcard{padding:18px 14px;}
      .form-2{grid-template-columns:1fr;}
      .lgrid{grid-template-columns:1fr;}
      .ptab{padding:9px 12px;font-size:12px;}
      .avatar-row{gap:14px;}
      .p-avatar{width:60px;height:60px;font-size:22px;}
      .p-name{font-size:var(--text-lg);}
    }
  </style>
</head>
<body>
<div class="auth-loading" id="al"><div class="al-icon">🏠</div><div class="al-spin"></div></div>
<div class="page" id="page">
  <div id="navbar-root"></div>
  <div class="pw">
    <div class="ptabs">
      <button class="ptab active" onclick="sw('profile')">👤 My Profile</button>
      <button class="ptab" onclick="sw('listings')">🏠 My Listings</button>
    </div>

    <div class="psec active" id="sec-profile">
      <div class="pcard">
        <div class="avatar-row">
          <div class="p-avatar" id="pav">?</div>
          <div>
            <div class="p-name" id="p-name">Loading…</div>
            <div class="p-email" id="p-email"></div>
          </div>
        </div>
        <form onsubmit="saveProfile(event)">
          <div class="form-2" style="margin-bottom:16px">
            <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="fullname" placeholder="Your name"/></div>
            <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" id="phone" placeholder="9876543210"/></div>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label class="form-label">Bio</label>
            <textarea class="form-textarea" id="bio" rows="3" placeholder="Tell others a bit about yourself…"></textarea>
          </div>
          <div class="form-2" style="margin-bottom:16px">
            <div class="form-group"><label class="form-label">I am a</label>
              <select class="form-select" id="role"><option value="owner">Owner</option><option value="agent">Agent</option><option value="builder">Builder</option></select>
            </div>
            <div class="form-group"><label class="form-label">Agency Name</label><input type="text" class="form-input" id="agency_name" placeholder="Optional"/></div>
          </div>
          <div class="form-group" style="margin-bottom:20px">
            <label class="form-label">RERA Number</label>
            <input type="text" class="form-input" id="rera_number" placeholder="Optional — for agents/builders"/>
          </div>
          <button type="submit" class="btn btn-primary" id="save-btn">💾 Save Profile</button>
        </form>
      </div>
    </div>

    <div class="psec" id="sec-listings">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <div style="font-size:var(--text-lg);font-weight:700">My Listed Properties</div>
        <a href="/list-property.html" class="btn btn-primary">+ New Listing</a>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
        <span class="sbadge pending">⏳ Pending</span>
        <span class="sbadge approved">✅ Approved</span>
        <span class="sbadge rejected">❌ Rejected</span>
      </div>
      <div class="lgrid" id="lgrid">
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Loading…</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast-el"></div>
<script>
let tok=null, cu=null;
window.addEventListener('DOMContentLoaded', async () => {
  const s=await getSession(); if(!s){window.location.href='/login.html';return;}
  cu=s.user; tok=s.access_token;
  document.getElementById('al').style.display='none';
  document.getElementById('page').style.display='block';
  await initNavbar({active:'profile'});
  await loadProfile();
  if(new URLSearchParams(window.location.search).get('tab')==='listings') sw('listings');
});
async function loadProfile(){
  try{
    const r=await fetch('/api/profiles/me',{headers:{Authorization:`Bearer ${tok}`}});
    if(!r.ok) throw new Error();
    const p=await r.json();
    const name=p.fullname||cu.email||'User';
    const ini=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('pav').innerHTML=p.avatar_url?`<img src="${p.avatar_url}" alt="avatar"/>`:`<span>${ini}</span>`;
    document.getElementById('p-name').textContent=name;
    document.getElementById('p-email').textContent=cu.email||'';
    ['fullname','phone','bio','role','agency_name','rera_number'].forEach(k=>{const el=document.getElementById(k);if(el&&p[k])el.value=p[k];});
  }catch(e){document.getElementById('p-name').textContent=cu.email||'User';}
}
async function saveProfile(e){
  e.preventDefault();
  const btn=document.getElementById('save-btn'); btn.disabled=true; btn.textContent='Saving…';
  const payload={};
  ['fullname','phone','bio','role','agency_name','rera_number'].forEach(k=>{const v=document.getElementById(k)?.value?.trim();if(v)payload[k]=v;});
  try{
    const r=await fetch('/api/profiles/me',{method:'PATCH',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tok}`},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error((await r.json()).error||'Failed');
    toast('✅ Profile saved!');
    if(payload.fullname) document.getElementById('p-name').textContent=payload.fullname;
  }catch(ex){toast('Error: '+ex.message);}
  finally{btn.disabled=false;btn.textContent='💾 Save Profile';}
}
async function loadListings(){
  try{
    const r=await fetch('/api/properties/mine',{headers:{Authorization:`Bearer ${tok}`}});
    const data=await r.json(); if(!Array.isArray(data))throw new Error();
    const g=document.getElementById('lgrid');
    if(!data.length){
      g.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🏠</div><div class="empty-title">No listings yet</div><a href="/list-property.html" class="btn btn-primary">List a Property</a></div>';
      return;
    }
    g.innerHTML=data.map(p=>{
      const status=p.status||'pending';
      const icons={pending:'⏳',approved:'✅',rejected:'❌'};
      const labels={pending:'Pending Approval',approved:'Approved',rejected:'Rejected'};
      return`<div class="lcard">
        <div class="lc-img">
          ${p.photos?.[0]?`<img src="${p.photos[0]}" alt="${x(p.title)}" loading="lazy"/>`:'<div class="lc-ph">🏠</div>'}
          <span style="position:absolute;top:8px;left:8px" class="badge badge-${p.type==='rent'?'rent':'buy'}">${p.type==='rent'?'Rent':'Sale'}</span>
        </div>
        <div class="lc-body">
          <div class="lc-price">₹${fp(p.price)}${p.type==='rent'?'<span style="font-size:var(--text-xs);color:var(--muted);font-weight:400">/mo</span>':''}</div>
          <div class="lc-title">${x(p.title||'Property')}</div>
          <div class="lc-loc">📍 ${x([p.locality,p.city].filter(Boolean).join(', '))}</div>
        </div>
        <div class="status-bar"><span class="sbadge ${status}">${icons[status]} ${labels[status]}</span></div>
        ${p.admin_note?`<div class="admin-note">📝 ${x(p.admin_note)}</div>`:''}
        <div class="lc-acts">
          <button class="btn btn-primary" style="flex:1;font-size:var(--text-xs);padding:6px" onclick="window.location.href='/property.html?id=${p.id}'">View</button>
          <button class="btn btn-secondary" style="flex:1;font-size:var(--text-xs);padding:6px" onclick="window.location.href='/list-property.html?edit=${p.id}'">Edit</button>
          <button style="padding:6px 10px;color:#dc2626;font-size:var(--text-xs);border:1px solid rgba(220,38,38,0.2);border-radius:var(--radius-md);background:transparent;cursor:pointer" onclick="delListing(${p.id})">🗑</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){document.getElementById('lgrid').innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load listings</div></div>';}
}
async function delListing(id){
  if(!confirm('Delete this listing? This cannot be undone.'))return;
  try{await fetch(`/api/properties/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${tok}`}});toast('Listing deleted');await loadListings();}
  catch(e){toast('Failed to delete');}
}
function sw(tab){
  document.querySelectorAll('.psec').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.ptab').forEach(el=>el.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  document.querySelectorAll('.ptab').forEach((el,i)=>{if((i===0&&tab==='profile')||(i===1&&tab==='listings'))el.classList.add('active');});
  if(tab==='listings') loadListings();
}
function fp(n){n=Number(n);if(n>=10000000)return(n/10000000).toFixed(1).replace(/\.0$/,'')+'Cr';if(n>=100000)return(n/100000).toFixed(1).replace(/\.0$/,'')+'L';return n.toLocaleString('en-IN');}
function x(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m){const el=document.getElementById('toast-el');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
</script>
</body>
</html>
